---
# administration Phase 1 (base bootstrap) entrypoint. Minimal admin cluster —
# bootstrap networking (plain Cilium + identity) plus secret prep. NO ClusterMesh
# here — that is a Phase 2 helm upgrade via clusters/administration/mesh.yaml
# (task: connect-clusters). Append 02-core/03-hardware/04-monitoring stages here if
# the admin cluster grows to need them.
#
#   helmfile -f clusters/administration/helmfile.yaml sync
#
# Requires the administration cluster to exist (kubernetes/terraform/administration)
# and the active kube-context to point at it.
helmfiles:
  - path: ../../helmfile.d/00-prepare.gotmpl.yaml
  - path: ../../helmfile.d/01-bootstrap.gotmpl.yaml
    values:
      - cluster: administration
      - identityOverlay: ../clusters/administration/identity-values.yaml.gotmpl
