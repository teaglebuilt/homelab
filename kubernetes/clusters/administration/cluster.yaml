# Human-readable identity / inventory for the administration cluster.
# PLANNED — the cluster is not provisioned yet. Values marked TODO need real
# infrastructure input before administration-cluster.tf can be applied.
name: administration
clusterId: 2              # unique 1-255; must differ from mlops (1)
podSubnet: 10.245.0.0/16 # disjoint from mlops 10.244.0.0/16 (hard requirement)
serviceSubnet: 10.97.0.0/16
proxmoxHost: pve1        # 192.168.2.100 (standalone host; separate API token)
nodeIps:                 # static (Proxmox cloud-init ip_config), outside lbPool
  controlplane: 192.168.2.6   # ADMIN_MASTER_NODE_IP (also the k8s API endpoint)
  worker: 192.168.2.7         # ADMIN_WORKER_NODE_IP
clustermeshApiserverLB: 192.168.2.248
lbPool: 192.168.2.241-192.168.2.254
# VM IDs 100/101 on pve1 (separate host from mlops, no collision).
