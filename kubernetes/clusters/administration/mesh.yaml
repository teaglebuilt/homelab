---
# Phase 2 — ClusterMesh activation for administration. Re-syncs ONLY the cilium
# release as a helm UPGRADE, layering the clustermesh overlay on top of identity.
# Run by `task connect-clusters` AFTER both clusters are bootstrapped (Phase 1),
# the shared CA is applied to both, and LB pools exist.
#
#   helmfile -f clusters/administration/mesh.yaml sync --selector name=cilium
helmfiles:
  - path: ../../helmfile.d/01-bootstrap.gotmpl.yaml
    values:
      - cluster: administration
      - identityOverlay: ../clusters/administration/identity-values.yaml.gotmpl
      - meshOverlay: ../clusters/administration/clustermesh-values.yaml.gotmpl
