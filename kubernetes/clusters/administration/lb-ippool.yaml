# administration LB-IPAM pool. Disjoint from mlops-pool (.12-.240) since both
# clusters share the 192.168.2.0/24 L2. The clustermesh-apiserver pins .248.
#
# NOTE: this /28-ish tail (.241-.255) is tight (15 IPs). If administration needs
# more LoadBalancer services, rebalance the split — e.g. give mlops .12-.199 and
# administration .200-.255.
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: administration-pool
spec:
  blocks:
    - start: 192.168.2.241
      stop: 192.168.2.255
