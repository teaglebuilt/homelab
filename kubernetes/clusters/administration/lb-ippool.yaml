# administration LB-IPAM pool. Disjoint from mlops-pool (.200-.240) since both
# clusters share the 192.168.2.0/24 L2. The clustermesh-apiserver pins .248.
#
# .241-.254 (14 IPs; .255 is the /24 broadcast, excluded). Above all node/host IPs.
# If administration ever needs more LoadBalancer IPs, rebalance the split.
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: administration-pool
spec:
  blocks:
    - start: 192.168.2.241
      stop: 192.168.2.254
