---
# Phase 2 — ClusterMesh activation for application. Re-syncs ONLY the cilium
# release as a helm UPGRADE, layering the clustermesh overlay on top of identity.
# Run by `task connect-clusters` AFTER both clusters are bootstrapped (Phase 1),
# the shared CA is applied to both, and LB pools exist.
#
#   helmfile -f clusters/application/mesh.yaml sync --selector name=cilium
helmfiles:
  - path: ../../helmfile.d/01-bootstrap.gotmpl.yaml
    values:
      - cluster: application
      - identityOverlay: ../clusters/application/identity-values.yaml.gotmpl
      - meshOverlay: ../clusters/application/clustermesh-values.yaml.gotmpl
