---
# application Phase 1 entrypoint — general workload cluster. Same staged
# helmfile.d/ deploys as mlops, diverging only by clusters/application/
# environment.yaml toggles (no GPU/WASM; owns the front door + central
# observability). Cilium identity name/id stay `application`/2 (live mesh).
#
#   helmfile -f clusters/application/helmfile.yaml sync
#
# Each stage is injected with `cluster: application`; stages read
# ../clusters/application/environment.yaml via readFile (relative to helmfile.d/).
helmfiles:
  - path: ../../helmfile.d/00-prepare.gotmpl.yaml
  - path: ../../helmfile.d/01-bootstrap.gotmpl.yaml
    values:
      - cluster: application
      - identityOverlay: ../clusters/application/identity-values.yaml.gotmpl
  - path: ../../helmfile.d/02-core.gotmpl.yaml
    values:
      - cluster: application
  - path: ../../helmfile.d/03-hardware.gotmpl.yaml
    values:
      - cluster: application
  - path: ../../helmfile.d/04-monitoring.gotmpl.yaml
    values:
      - cluster: application
  - path: ../../helmfile.d/05-gitops.gotmpl.yaml
    values:
      - cluster: application
