# Human-readable identity / inventory for the mlops cluster.
# Single source of truth for the values that MUST stay unique across the mesh.
# Not consumed by any tool — keep it in sync with the Terraform + Cilium overlay.
name: mlops
clusterId: 1              # unique 1-255; administration = 2
podSubnet: 10.244.0.0/16 # kubernetes/terraform/mlops-cluster.tf (cluster.pod_subnet)
serviceSubnet: 10.96.0.0/12
proxmoxHost: pve2        # 192.168.2.101
nodeIps:                 # static (Proxmox cloud-init ip_config), outside lbPool
  controlplane: 192.168.2.195
  worker00: 192.168.2.19
  worker01: 192.168.2.20
clustermeshApiserverLB: 192.168.2.240
lbPool: 192.168.2.200-192.168.2.240
