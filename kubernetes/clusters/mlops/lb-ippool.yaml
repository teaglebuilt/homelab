# mlops LB-IPAM pool. Both clusters share the 192.168.2.0/24 L2 broadcast domain,
# so their pools MUST be disjoint AND must exclude static node IPs, or Cilium could
# hand a LoadBalancer an IP already used by a node.
#
# Range starts at .200 — above every node/host on the segment (mlops .19/.20/.195,
# admin .6/.7, hosts .100/.101). Replaces the shared proxmox-pool (.12-.255).
# The clustermesh-apiserver pins .240 from this range.
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: mlops-pool
spec:
  blocks:
    - start: ${MLOPS_LB_POOL_START}
      stop: ${MLOPS_LB_POOL_STOP}
