---
version: 3

includes:
  talos:
    taskfile: ".taskfiles/talos/Taskfile.yaml"
  debug:
    taskfile: ".taskfiles/debug/Taskfile.yaml"
  gpu:
    taskfile: ".taskfiles/gpu/Taskfile.yaml"

env:
  PROXMOX_VE_USERNAME: "{{.PROXMOX_USERNAME}}"
  PROXMOX_VE_PASSWORD: "{{.PROXMOX_PASSWORD}}"
  PROXMOX_VE_ENDPOINT: "https://{{.PROXMOX_NODE_TWO_IP}}:8006"
  PROXMOX_VE_API_TOKEN: "{{.PROXMOX_NODE_TWO_API_TOKEN}}"
  PROXMOX_VE_SSH_AGENT: "false"
  PROXMOX_VE_SSH_PRIVATE_KEY: "{{.PROXMOX_NODE_TWO_PRIVATE_KEY}}"
  # TF_LOG: DEBUG

tasks:
  provision-mlops:
    dir: kubernetes
    cmds:
      - |-
        tofu -chdir=terraform/mlops init --upgrade
      - |-
        tofu -chdir=terraform/mlops plan \
          -var k8s_api_server_ip=${MLOPS_MASTER_NODE_IP} \
          -var network_gateway=${PROXMOX_NETWORK_GATEWAY} \
          -var master_node_ip=${MLOPS_MASTER_NODE_IP} \
          -var worker_one_node_ip=${MLOPS_WORKER_00_NODE_IP} \
          -var worker_two_node_ip=${MLOPS_WORKER_01_NODE_IP} \
          -var proxmox_ssh_private_key=${PROXMOX_VE_SSH_PRIVATE_KEY} \
          -var graylog_ip=${GRAYLOG_IP}
      - |-
        tofu -chdir=terraform/mlops apply -auto-approve \
          -var k8s_api_server_ip=${MLOPS_MASTER_NODE_IP} \
          -var network_gateway=${PROXMOX_NETWORK_GATEWAY} \
          -var master_node_ip=${MLOPS_MASTER_NODE_IP} \
          -var worker_one_node_ip=${MLOPS_WORKER_00_NODE_IP} \
          -var worker_two_node_ip=${MLOPS_WORKER_01_NODE_IP} \
          -var proxmox_ssh_private_key=${PROXMOX_VE_SSH_PRIVATE_KEY} \
          -var graylog_ip=${GRAYLOG_IP}

  destroy-mlops:
    dir: kubernetes
    cmds:
      - |-
        tofu -chdir=terraform/mlops init --upgrade
      - |-
        tofu -chdir=terraform/mlops destroy -auto-approve \
          -var k8s_api_server_ip=${MLOPS_MASTER_NODE_IP} \
          -var network_gateway=${PROXMOX_NETWORK_GATEWAY} \
          -var master_node_ip=${MLOPS_MASTER_NODE_IP} \
          -var worker_one_node_ip=${MLOPS_WORKER_00_NODE_IP} \
          -var worker_two_node_ip=${MLOPS_WORKER_01_NODE_IP} \
          -var proxmox_ssh_private_key=${PROXMOX_VE_SSH_PRIVATE_KEY} \
          -var graylog_ip=${GRAYLOG_IP}

  bootstrap-cluster:
    summary: Phase 1 — base bootstrap for a cluster (plain Cilium + identity, no mesh) and its LB-IPAM pool
    dir: kubernetes
    requires:
      vars: [CLUSTER]
    vars:
      KUBECONFIG_FILE: '{{if eq .CLUSTER "administration"}}generated/administration/kubeconfig{{else}}generated/kubeconfig{{end}}'
    env:
      KUBECONFIG: '{{.KUBECONFIG_FILE}}'
    cmds:
      - helmfile -f clusters/{{.CLUSTER}}/helmfile.yaml sync
      # This cluster's disjoint LB-IPAM pool (envsubst-templated ranges) + retire
      # the legacy shared proxmox-pool. Needed by ANY LoadBalancer in the cluster,
      # so it belongs in base bootstrap — not gated behind the mesh.
      - envsubst < clusters/{{.CLUSTER}}/lb-ippool.yaml | kubectl apply -f -
      - kubectl delete ciliumloadbalancerippool proxmox-pool --ignore-not-found

  sync-cluster:
    dir: kubernetes
    cmds:
      - make helmfile_sync

  wait-for-external-certificate:
    dir: kubernetes
    cmds:
      - echo "Waiting for external certificate to be ready..."
      - |
        kubectl wait certificate external-certificate \
          -n kube-system \
          --for=condition=Ready \
          --timeout=5m

  reboot-cluster-node:
    dir: kubernetes
    cmds:
      - task: talos:reboot-node

  cluster-health:
    dir: kubernetes
    cmds:
      - |
        until kubectl get nodes --no-headers | awk '{print $2}' | grep -q "NotReady"; do
          echo "Waiting for Kubernetes cluster to become healthy..."
          sleep 10
        done
        echo "Kubernetes cluster is healthy!"

  update-dependencies:
    dir: kubernetes
    cmds:
      - make helmfile_lock
      - make build_chart_dependencies

  copy-kubeconfig:
    dir: kubernetes
    cmds:
      - cp generated/kubeconfig ~/.kube/config

  provision-administration:
    summary: Provision the administration Talos cluster on pve1 (separate TF root)
    dir: kubernetes
    env:
      PROXMOX_VE_ENDPOINT: "https://{{.PROXMOX_NODE_ONE_IP}}:8006"
      PROXMOX_VE_API_TOKEN: "{{.PROXMOX_NODE_ONE_API_TOKEN}}"
      PROXMOX_VE_SSH_PRIVATE_KEY: "{{.PROXMOX_NODE_ONE_PRIVATE_KEY}}"
    preconditions:
      - sh: '[ -n "$ADMIN_MASTER_NODE_IP" ]'
        msg: "ADMIN_MASTER_NODE_IP is not set — add ADMIN_MASTER_NODE_IP and ADMIN_WORKER_NODE_IP to kubernetes/.env (192.168.2.0/24 IPs on pve1). See kubernetes/clusters/administration/cluster.yaml."
      - sh: '[ -n "$ADMIN_WORKER_NODE_IP" ]'
        msg: "ADMIN_WORKER_NODE_IP is not set — add it to kubernetes/.env."
    cmds:
      - tofu -chdir=terraform/administration init --upgrade
      - |-
        tofu -chdir=terraform/administration plan \
          -var admin_k8s_api_server_ip=${ADMIN_MASTER_NODE_IP} \
          -var admin_master_node_ip=${ADMIN_MASTER_NODE_IP} \
          -var admin_worker_node_ip=${ADMIN_WORKER_NODE_IP} \
          -var network_gateway=${PROXMOX_NETWORK_GATEWAY} \
          -var graylog_ip=${GRAYLOG_IP} \
          -var proxmox_ssh_private_key=${PROXMOX_NODE_ONE_PRIVATE_KEY}
      - |-
        tofu -chdir=terraform/administration apply -auto-approve \
          -var admin_k8s_api_server_ip=${ADMIN_MASTER_NODE_IP} \
          -var admin_master_node_ip=${ADMIN_MASTER_NODE_IP} \
          -var admin_worker_node_ip=${ADMIN_WORKER_NODE_IP} \
          -var network_gateway=${PROXMOX_NETWORK_GATEWAY} \
          -var graylog_ip=${GRAYLOG_IP} \
          -var proxmox_ssh_private_key=${PROXMOX_NODE_ONE_PRIVATE_KEY}

  destroy-administration:
    dir: kubernetes
    env:
      PROXMOX_VE_ENDPOINT: "https://{{.PROXMOX_NODE_ONE_IP}}:8006"
      PROXMOX_VE_API_TOKEN: "{{.PROXMOX_NODE_ONE_API_TOKEN}}"
      PROXMOX_VE_SSH_PRIVATE_KEY: "{{.PROXMOX_NODE_ONE_PRIVATE_KEY}}"
    cmds:
      - |-
        tofu -chdir=terraform/administration destroy -auto-approve \
          -var admin_k8s_api_server_ip=${ADMIN_MASTER_NODE_IP} \
          -var admin_master_node_ip=${ADMIN_MASTER_NODE_IP} \
          -var admin_worker_node_ip=${ADMIN_WORKER_NODE_IP} \
          -var network_gateway=${PROXMOX_NETWORK_GATEWAY} \
          -var graylog_ip=${GRAYLOG_IP} \
          -var proxmox_ssh_private_key=${PROXMOX_NODE_ONE_PRIVATE_KEY}

  mesh-upgrade:
    summary: Phase 2 — activate ClusterMesh on a cluster (Cilium helm upgrade with the clustermesh overlay)
    dir: kubernetes
    requires:
      vars: [CLUSTER]
    vars:
      KUBECONFIG_FILE: '{{if eq .CLUSTER "administration"}}generated/administration/kubeconfig{{else}}generated/kubeconfig{{end}}'
    env:
      KUBECONFIG: '{{.KUBECONFIG_FILE}}'
    preconditions:
      - sh: 'test -f clusters/_shared/cilium-ca.sops.yaml'
        msg: "Shared CA missing: generate clusters/_shared/cilium-ca.sops.yaml (see clusters/_shared/README.md) and apply it to BOTH clusters first — authMode:cluster needs it or clustermesh-apiserver never goes Ready."
    cmds:
      # Helm UPGRADE of just the cilium release, layering the clustermesh overlay on
      # top of identity. --selector confines the sync to cilium so the other
      # bootstrap releases (coredns, spegel, csi-driver-nfs, ...) are not re-run.
      - helmfile -f clusters/{{.CLUSTER}}/mesh.yaml sync --selector name=cilium

  apply-shared-ca:
    summary: Decrypt and apply the shared Cilium CA to a cluster (mesh trust anchor)
    dir: kubernetes
    requires:
      vars: [CLUSTER]
    vars:
      KUBECONFIG_FILE: '{{if eq .CLUSTER "administration"}}generated/administration/kubeconfig{{else}}generated/kubeconfig{{end}}'
    env:
      KUBECONFIG: '{{.KUBECONFIG_FILE}}'
    status:
      # No-op until the encrypted CA exists (see clusters/_shared/README.md).
      - test ! -f clusters/_shared/cilium-ca.sops.yaml
    cmds:
      - sops -d clusters/_shared/cilium-ca.sops.yaml | kubectl apply -f -

  clustermesh-routes:
    summary: Print per-node podCIDR -> nodeIP table for the UniFi static routes
    dir: kubernetes
    requires:
      vars: [CLUSTER]
    vars:
      KUBECONFIG_FILE: '{{if eq .CLUSTER "administration"}}generated/administration/kubeconfig{{else}}generated/kubeconfig{{end}}'
    env:
      KUBECONFIG: '{{.KUBECONFIG_FILE}}'
    cmds:
      - 'echo "# {{.CLUSTER}}: dest podCIDR -> next-hop nodeIP (one route per node)"'
      - kubectl get nodes -o jsonpath='{range .items[*]}{.spec.podCIDR}{" via "}{.status.addresses[?(@.type=="InternalIP")].address}{"  # "}{.metadata.name}{"\n"}{end}'

  clustermesh-status:
    summary: Read-only ClusterMesh health for a cluster
    dir: kubernetes
    requires:
      vars: [CLUSTER]
    vars:
      KUBECONFIG_FILE: '{{if eq .CLUSTER "administration"}}generated/administration/kubeconfig{{else}}generated/kubeconfig{{end}}'
    env:
      KUBECONFIG: '{{.KUBECONFIG_FILE}}'
    cmds:
      - kubectl -n kube-system get svc clustermesh-apiserver
      - kubectl -n kube-system get secret cilium-clustermesh --ignore-not-found
      - kubectl -n kube-system exec ds/cilium -- cilium-dbg status --verbose | grep -A6 ClusterMesh || true
