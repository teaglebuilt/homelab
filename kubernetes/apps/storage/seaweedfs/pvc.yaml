---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seaweedfs-data
  namespace: storage
  labels:
    app.kubernetes.io/name: seaweedfs
    app.kubernetes.io/part-of: homelab
spec:
  accessModes:
    - ReadWriteOnce
  # Node-local disk (default class, Talos /var/local-path-provisioner) — SeaweedFS
  # IS the S3 server, so its own object bytes sit on local disk, not NFS. Loki (the
  # S3 client) then needs no filesystem mount at all.
  storageClassName: local-path
  resources:
    requests:
      storage: 50Gi
