---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs
  namespace: storage
  labels:
    app.kubernetes.io/name: seaweedfs
    app.kubernetes.io/part-of: homelab
spec:
  replicas: 1
  strategy:
    # RWO PVC: never run two pods against the same volume at once.
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: seaweedfs
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seaweedfs
        app.kubernetes.io/part-of: homelab
    spec:
      containers:
        - name: seaweedfs
          image: chrislusf/seaweedfs:4.38
          args:
            - server
            - -dir=/data
            - -master.volumeSizeLimitMB=1024
            - -volume.max=0
            - -s3
            - -s3.config=/etc/seaweedfs/s3.json
            - -s3.port=8333
          ports:
            - name: s3
              containerPort: 8333
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /data
            - name: s3-config
              mountPath: /etc/seaweedfs
              readOnly: true
          readinessProbe:
            tcpSocket:
              port: 8333
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            tcpSocket:
              port: 8333
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 1Gi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: seaweedfs-data
        - name: s3-config
          secret:
            secretName: seaweedfs-s3
            items:
              - key: s3.json
                path: s3.json
