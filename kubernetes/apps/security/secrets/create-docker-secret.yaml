---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: docker-secret-creator
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: docker-secret-creator
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "delete", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: docker-secret-creator
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: docker-secret-creator
subjects:
  - kind: ServiceAccount
    name: docker-secret-creator
    namespace: default
---
apiVersion: batch/v1
kind: Job
metadata:
  name: create-ghcr-registry-secret
  namespace: default
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      serviceAccountName: docker-secret-creator
      containers:
        - name: create-secret
          image: bitnamilegacy/kubectl:1.33.4
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              USERNAME=$(kubectl get secret ghcr-credentials -o jsonpath='{.data.username}' | base64 -d)
              PASSWORD=$(kubectl get secret ghcr-credentials -o jsonpath='{.data.password}' | base64 -d)

              kubectl delete secret ghcr-secret --ignore-not-found=true

              kubectl create secret docker-registry ghcr-secret \
                --docker-server=ghcr.io \
                --docker-username="${USERNAME}" \
                --docker-password="${PASSWORD}" \
                --dry-run=client -o yaml | kubectl apply -f -

              kubectl annotate secret ghcr-secret \
                reflector.v1.k8s.emberstack.com/reflection-allowed=true \
                reflector.v1.k8s.emberstack.com/reflection-auto-enabled=true \
                --overwrite
      restartPolicy: OnFailure
