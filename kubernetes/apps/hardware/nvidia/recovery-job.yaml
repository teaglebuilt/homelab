---
apiVersion: batch/v1
kind: Job
metadata:
  generateName: gpu-recover-
  namespace: kube-system
  labels:
    app.kubernetes.io/name: gpu-recovery
    app.kubernetes.io/component: hardware-recovery-manual
    app.kubernetes.io/part-of: homelab
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  activeDeadlineSeconds: 900
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gpu-recovery
        app.kubernetes.io/component: hardware-recovery-manual
    spec:
      serviceAccountName: gpu-recovery
      priorityClassName: system-node-critical
      hostPID: true
      restartPolicy: Never
      nodeSelector:
        kubernetes.io/hostname: mlops-work-00
      tolerations:
        - operator: Exists
      containers:
        - name: recovery
          image: alpine/k8s:1.30.3
          command: ["/bin/bash", "-c"]
          args:
            - |
              cp /scripts/recover.sh /usr/local/bin/recover.sh
              chmod +x /usr/local/bin/recover.sh
              exec /usr/local/bin/recover.sh
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: DETECTED_XID
              value: "manual"
            - name: MAX_ATTEMPTS
              value: "3"
            - name: WINDOW_SECONDS
              value: "3600"
            - name: ENABLE_NODE_REBOOT
              value: "false"
          securityContext:
            privileged: true
            runAsUser: 0
            capabilities:
              add: ["SYS_ADMIN", "SYS_PTRACE"]
          volumeMounts:
            - name: scripts
              mountPath: /scripts
            - name: host-sys
              mountPath: /sys
            - name: host-proc
              mountPath: /host/proc
            - name: state
              mountPath: /var/lib/gpu-recovery
            - name: talosconfig
              mountPath: /etc/talos
              readOnly: true
      volumes:
        - name: scripts
          configMap:
            # PLACEHOLDER — substituted at apply time with the live hashed
            # name discovered from ds/gpu-recovery.
            name: gpu-recovery-scripts
            defaultMode: 0755
        - name: host-sys
          hostPath:
            path: /sys
            type: Directory
        - name: host-proc
          hostPath:
            path: /proc
            type: Directory
        - name: state
          hostPath:
            path: /var/lib/gpu-recovery
            type: DirectoryOrCreate
        - name: talosconfig
          secret:
            secretName: gpu-recovery-talosconfig
            optional: true
