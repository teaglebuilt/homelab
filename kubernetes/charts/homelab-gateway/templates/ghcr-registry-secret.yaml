{{- /*
Mint the ghcr.io docker-registry pull secret on this cluster as a Helm hook, so
it exists on EVERY cluster running homelab-gateway (stage 02-core) BEFORE any
platform workload deploys. Reads the SOPS-provisioned `ghcr-credentials` Secret
(applied in stage 00-prepare) and creates `ghcr-secret`, annotated for Reflector
auto-reflection so every namespace inherits the pull secret.

Runs as post-install/post-upgrade so it re-mints on every helmfile sync. The RBAC
is created first (hook-weight -5) and torn down with the Job after success.
*/ -}}
{{- if .Values.ghcrSecret.enabled }}
{{- $ns := .Values.ghcrSecret.namespace }}
{{- $src := .Values.ghcrSecret.sourceSecret }}
{{- $dst := .Values.ghcrSecret.targetSecret }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: docker-secret-creator
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: homelab-gateway
    app.kubernetes.io/part-of: homelab
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: docker-secret-creator
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: homelab-gateway
    app.kubernetes.io/part-of: homelab
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create", "delete", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: docker-secret-creator
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: homelab-gateway
    app.kubernetes.io/part-of: homelab
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: docker-secret-creator
subjects:
  - kind: ServiceAccount
    name: docker-secret-creator
    namespace: {{ $ns }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: create-ghcr-registry-secret
  namespace: {{ $ns }}
  labels:
    app.kubernetes.io/name: homelab-gateway
    app.kubernetes.io/part-of: homelab
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "0"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 4
  template:
    spec:
      serviceAccountName: docker-secret-creator
      restartPolicy: OnFailure
      containers:
        - name: create-secret
          image: {{ .Values.ghcrSecret.image }}
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              USERNAME=$(kubectl get secret {{ $src }} -n {{ $ns }} -o jsonpath='{.data.username}' | base64 -d)
              PASSWORD=$(kubectl get secret {{ $src }} -n {{ $ns }} -o jsonpath='{.data.password}' | base64 -d)

              kubectl delete secret {{ $dst }} -n {{ $ns }} --ignore-not-found=true

              kubectl create secret docker-registry {{ $dst }} -n {{ $ns }} \
                --docker-server=ghcr.io \
                --docker-username="${USERNAME}" \
                --docker-password="${PASSWORD}" \
                --dry-run=client -o yaml | kubectl apply -f -

              kubectl annotate secret {{ $dst }} -n {{ $ns }} \
                reflector.v1.k8s.emberstack.com/reflection-allowed=true \
                reflector.v1.k8s.emberstack.com/reflection-auto-enabled=true \
                --overwrite
{{- end }}
