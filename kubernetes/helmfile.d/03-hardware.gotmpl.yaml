---
{{- /* Hardware stage. GPU (enable.gpu) and WASM (enable.wasm) releases are
       cluster-exclusive — they render only where the toggle is true (mlops in
       Phase 1). Both default true for a direct `helmfile sync .` (single-cluster
       mlops behaviour). node-problem-detector is DELIBERATELY GPU-coupled (needs
       nvidia-device-plugin + apps/hardware/nvidia/npd-values.yaml) — do not
       promote it to an always-on release. */ -}}
{{- $cluster := .Values | get "cluster" "mlops" }}
{{- $env := readFile (printf "../clusters/%s/environment.yaml" $cluster) | fromYaml }}
{{- $enable := $env | get "enable" dict }}
{{- $gpu := $enable | get "gpu" true }}
{{- $wasm := $enable | get "wasm" true }}
bases:
  - ../defaults.yaml

repositories:
  - name: nvidia
    url: https://nvidia.github.io/k8s-device-plugin
  - name: gpu-helm-charts
    url: https://nvidia.github.io/dcgm-exporter/helm-charts
  - name: deliveryhero
    url: https://charts.deliveryhero.io/
  - name: kwasm
    url: http://kwasm.sh/kwasm-operator/

releases:
  - name: nvidia-device-plugin
    namespace: kube-system
    chart: nvidia/nvidia-device-plugin
    version: 0.17.1
    installed: {{ $gpu }}
    values:
      - runtimeClassName: nvidia
      - devicePlugin:
          enabled: true
        gfd:
          enabled: true
        nfd:
          enabled: true
      - config:
          default: "default"
          map:
            default: |-
              version: v1
              flags:
                migStrategy: none
              sharing:
                timeSlicing:
                  resources:
                    - name: nvidia.com/gpu
                      replicas: 2
    hooks:
      - events: ["presync"]
        showlogs: true
        command: "bash"
        args:
          - -c
          - |
            kustomize build ../apps/hardware/nvidia | kubectl apply -f -

  - name: dcgm-exporter
    namespace: kube-system
    chart: gpu-helm-charts/dcgm-exporter
    version: 3.6.0
    installed: {{ $gpu }}
    {{- if $gpu }}
    needs:
      - kube-system/nvidia-device-plugin
    {{- end }}
    values:
      - runtimeClassName: nvidia
        nodeSelector:
          feature.node.kubernetes.io/pci-10de.present: "true"
        serviceMonitor:
          enabled: true
          interval: 10s
          honorLabels: true

  - name: node-problem-detector
    namespace: kube-system
    chart: deliveryhero/node-problem-detector
    version: 2.3.13
    installed: {{ $gpu }}
    {{- if $gpu }}
    needs:
      - kube-system/nvidia-device-plugin
    {{- end }}
    values:
      - ../apps/hardware/nvidia/npd-values.yaml

  - name: kwasm-operator
    chart: kwasm/kwasm-operator
    version: 0.2.3
    namespace: kube-system
    installed: {{ $wasm }}
    values:
      - kwasmOperator:
          installerImage: ghcr.io/spinframework/containerd-shim-spin/node-installer:v0.19.0

  - name: spin-operator
    chart: oci://ghcr.io/spinframework/charts/spin-operator
    version: 0.5.0
    namespace: kube-system
    installed: {{ $wasm }}
    {{- if $wasm }}
    needs:
      - kube-system/kwasm-operator
    {{- end }}
    hooks:
      - events: ["presync"]
        showlogs: true
        command: "kubectl"
        args:
          - "apply"
          - -f
          - https://github.com/spinframework/spin-operator/releases/download/v0.5.0/spin-operator.crds.yaml
          - -f
          - https://github.com/spinframework/spin-operator/releases/download/v0.5.0/spin-operator.runtime-class.yaml
      - events: ["postsync"]
        showlogs: true
        command: "bash"
        args:
          - -c
          - |
            kustomize build ../apps/hardware/wasm | kubectl apply -f -
