---
# Cluster-local log shipping only.
#
# METRICS (Prometheus / Grafana / parca) are NOT here — they live in
# platform/observability/ as a kustomize stack with per-cluster overlays
# (prometheus/overlays/<cluster>), deployed via `task platform:observability:deploy`.
# That path owns the `observability` namespace with PRIVILEGED PodSecurity
# (platform/observability/namespace.yaml), which a helmfile-created namespace does
# not get — an earlier inline kube-prometheus-stack release here failed exactly
# because its namespace defaulted to `restricted` and node-exporter was blocked.
bases:
  - ../defaults.yaml

repositories:
  - name: vector
    url: https://helm.vector.dev

releases:
  - name: vector
    namespace: observability
    createNamespace: true
    chart: vector/vector
    version: 0.44.0
    # values:
    #   - ../apps/monitoring/vector.yaml
