---
{{- /* Cluster identity for per-cluster kustomize overlays (apps/<app>/<cluster>).
       Injected by clusters/<name>/helmfile.yaml. Defaults to mlops so a direct
       `helmfile sync .` from helmfile.d/ keeps single-cluster behaviour. */ -}}
{{- $cluster := .Values | get "cluster" "mlops" }}
{{- /* kube-dns clusterIP is derived from the cluster's own SSOT
       (cluster.yaml dnsIP = 10th IP of serviceSubnet = Talos kubelet clusterDNS).
       readFile resolves relative to this helmfile (helmfile.d/), same as the
       ../apps/networking/cilium/overlays/<cluster> path used in the cilium hook below. */ -}}
{{- $clusterCfg := readFile (printf "../clusters/%s/cluster.yaml" $cluster) | fromYaml }}
bases:
  - ../defaults.yaml

repositories:
  - name: cilium
    url: https://helm.cilium.io
  - name: coredns
    url: https://coredns.github.io/helm
  - name: csi-driver-nfs
    url: https://raw.githubusercontent.com/kubernetes-csi/csi-driver-nfs/master/charts
  - name: emberstack
    url: https://emberstack.github.io/helm-charts
  - name: stakater
    url: https://stakater.github.io/stakater-charts

releases:
  - name: reflector
    namespace: kube-system
    chart: emberstack/reflector
    version: 7.1.288

  - name: reloader
    namespace: kube-system
    chart: stakater/reloader
    version: 2.2.14

  - name: cilium
    namespace: kube-system
    chart: cilium/cilium
    version: 1.18.11
    createNamespace: true
    values:
      - ../apps/networking/cilium/values.yaml
      {{- $identity := .Values | get "identityOverlay" "" }}
      {{- if $identity }}
      # Phase 1 identity overlay (cluster.name/id + native-routing CIDR), injected
      # by clusters/<name>/helmfile.yaml. Empty by default → single-cluster
      # behaviour unchanged when synced directly from helmfile.d.
      - {{ $identity }}
      {{- end }}
      {{- $mesh := .Values | get "meshOverlay" "" }}
      {{- if $mesh }}
      # Phase 2 ClusterMesh overlay (apiserver + peering), injected as a helm
      # upgrade by clusters/<name>/mesh.yaml AFTER both clusters exist + shared CA.
      - {{ $mesh }}
      {{- end }}
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: "bash"
        args:
          - -c
          - |
            set -euo pipefail

            for crd in ciliuml2announcementpolicies.cilium.io ciliumloadbalancerippools.cilium.io; do
              until kubectl get crd "$crd" >/dev/null 2>&1; do
                echo "waiting for CRD $crd to be registered by cilium-operator..."; sleep 3
              done
              kubectl wait --for=condition=established --timeout=120s "crd/$crd"
            done

            kustomize build --enable-exec --enable-helm ../apps/networking/cilium/overlays/{{ $cluster }} | envsubst | kubectl apply -f -

  - name: coredns
    namespace: kube-system
    chart: coredns/coredns
    version: 1.37.3
    createNamespace: true
    values:
      - ../apps/networking/coredns/values.yaml
      # kube-dns Service IP MUST equal Talos kubelet clusterDNS (10th IP of this
      # cluster's serviceSubnet) or DNS breaks / the Service fails to allocate.
      # Sourced from clusters/<cluster>/cluster.yaml (dnsIP). This inline entry is
      # LAST in the values list, so it wins over the base values.yaml default.
      - service:
          clusterIP: {{ $clusterCfg.dnsIP | default "10.96.0.10" | quote }}
    needs:
      - kube-system/cilium

  - name: spegel
    namespace: spegel
    chart: oci://ghcr.io/spegel-org/helm-charts/spegel
    version: 0.5.1
    values:
      - ../apps/security/spegel/values.yaml
    needs:
      - kube-system/coredns
    hooks:
      - events: ["presync"]
        showlogs: true
        command: "bash"
        args:
          - -c
          - |
            kubectl create namespace spegel --dry-run=client -o yaml | kubectl apply -f -
            kubectl label namespace spegel pod-security.kubernetes.io/enforce=privileged --overwrite

  - name: csi-driver-nfs
    namespace: kube-system
    chart: csi-driver-nfs/csi-driver-nfs
    version: 4.11.0
    values:
      - enableFSGroupPolicy: true
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: "bash"
        args:
          - -c
          - |
            manifests=$(kustomize build --enable-exec --enable-helm ../apps/storage/nfs/overlays/{{ $cluster }})
            if [ -n "$manifests" ]; then
              echo "$manifests" | kubectl apply -f -
            else
              echo "No NFS storage resources for cluster '{{ $cluster }}' — skipping."
            fi
      {{- if eq $cluster "application" }}
      - events: ["postsync"]
        showlogs: true
        command: "bash"
        args:
          - -c
          - |
            set -euo pipefail
            kustomize build --enable-alpha-plugins --enable-exec ../apps/storage/seaweedfs | kubectl apply -f -
      {{- end }}

  - name: metrics-server
    chart: metrics-server/metrics-server
    namespace: kube-system
    version: 3.8.3
    values:
      - apiService:
          create: true
        metrics:
          enabled: true
        hostNetwork:
          enabled: true
        args:
          - --cert-dir=/tmp
          - --kubelet-use-node-status-port
          - --kubelet-insecure-tls
          - --kubelet-preferred-address-types=InternalDNS,InternalIP,ExternalIP,Hostname
          - --metric-resolution=60s
