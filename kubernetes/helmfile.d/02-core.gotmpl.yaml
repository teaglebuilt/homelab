---
{{- /* Per-cluster toggles + placement from clusters/<cluster>/environment.yaml.
       `cluster` is injected by clusters/<name>/helmfile.yaml (defaults to mlops
       for a direct `helmfile sync .`). Toggles read defensively with `get`, so a
       stage rendered without env injection keeps single-cluster mlops defaults. */ -}}
{{- $cluster := .Values | get "cluster" "mlops" }}
{{- $env := readFile (printf "../clusters/%s/environment.yaml" $cluster) | fromYaml }}
{{- $enable := $env | get "enable" dict }}
{{- $ns := $env | get "nodeSelector" dict }}
{{- /* Default to an EMPTY selector (no pin). The mlops-work-01 pin comes from
       clusters/mlops/environment.yaml itself, so a direct `helmfile sync .`
       (cluster defaults to mlops) still pins correctly, while `application`'s
       empty {} selectors render as no-pin. */ -}}
{{- $nsCert := $ns | get "certManager" dict }}
{{- $nsCnpg := $ns | get "cnpg" dict }}
bases:
  - ../defaults.yaml

repositories:
  - name: cloudflare
    url: https://cloudflare.github.io/helm-charts
  - name: external-dns
    url: https://kubernetes-sigs.github.io/external-dns
  - name: jetstack
    url: https://charts.jetstack.io
  - name: cnpg
    url: https://cloudnative-pg.github.io/charts

releases:
  # FRONT DOOR (cloudflare-tunnel + public external-dns) — lives on `application`
  # (enable.frontDoor). SYNC-ORDERING HAZARD: when moving the front door between
  # clusters, ENABLE + sync it on the new owner (application) FIRST, and only then
  # disable on the old owner (mlops). `installed: false` UNINSTALLS the release, so
  # flipping mlops off before application is up drops the live tunnel/DNS.
  - name: cloudflare-tunnel
    namespace: kube-system
    chart: cloudflare/cloudflare-tunnel
    version: 0.3.2
    installed: {{ $enable | get "frontDoor" true }}
    values:
      - ../apps/networking/cloudflare/cloudflare-tunnel.yaml.gotmpl

  - name: internal-dns
    namespace: external-dns
    chart: external-dns/external-dns
    version: 1.17.0
    createNamespace: true
    values:
      - ../apps/networking/externaldns/internal-values.yaml.gotmpl

  - name: external-dns
    namespace: external-dns
    chart: external-dns/external-dns
    version: 1.17.0
    createNamespace: true
    installed: {{ $enable | get "frontDoor" true }}
    values:
      - ../apps/networking/externaldns/external-values.yaml.gotmpl

  - name: cert-manager
    namespace: cert-manager
    chart: jetstack/cert-manager
    version: v1.20.2
    createNamespace: true
    installed: {{ $enable | get "certManager" true }}
    needs:
      # Depend on whichever external-dns release actually exists in this cluster:
      # the public `external-dns` only runs where the front door lives, so fall
      # back to the always-present `internal-dns` to avoid a dangling `needs`.
      {{- if $enable | get "frontDoor" true }}
      - external-dns/external-dns
      {{- else }}
      - external-dns/internal-dns
      {{- end }}
    values:
      - crds:
          enabled: true
        nodeSelector:
          {{- $nsCert | toYaml | nindent 10 }}
        cainjector:
          nodeSelector:
            {{- $nsCert | toYaml | nindent 12 }}
        webhook:
          nodeSelector:
            {{- $nsCert | toYaml | nindent 12 }}
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: "bash"
        args:
          - -c
          - |
            kustomize build ../apps/security/cert-manager \
              --enable-helm --enable-exec --enable-alpha-plugins | envsubst | kubectl apply -f -

  - name: homelab-gateway
    chart: ../charts/homelab-gateway
    namespace: kube-system
    installed: {{ $enable | get "gateway" true }}
    needs:
      {{- if $enable | get "frontDoor" true }}
      - external-dns/external-dns
      {{- else }}
      - external-dns/internal-dns
      {{- end }}
      - cert-manager/cert-manager
    values:
      - external:
          domain: {{ requiredEnv "CLOUDFLARE_DOMAIN" }}
          tunnel_id: {{ requiredEnv "CLOUDFLARE_TUNNEL_ID" }}

  - name: cnpg
    namespace: cnpg-system
    chart: cnpg/cloudnative-pg
    version: 0.28.2
    createNamespace: true
    installed: {{ $enable | get "cnpg" true }}
    values:
      - nodeSelector:
          {{- $nsCnpg | toYaml | nindent 10 }}
        monitoring:
          podMonitorEnabled: true
          grafanaDashboard:
            create: true
    hooks:
      - events: ["postsync"]
        showlogs: true
        command: "bash"
        args:
          - -c
          - |
            kubectl rollout restart deployment -n cnpg-system cnpg-cloudnative-pg
            kubectl rollout status deployment -n cnpg-system cnpg-cloudnative-pg --timeout=2m
