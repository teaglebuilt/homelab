---
hooks:
  - events: ["prepare"]
    showlogs: true
    command: "bash"
    args:
      - -c
      - kustomize build ../apps/storage/local | kubectl apply -f -
  - events: ["prepare"]
    showlogs: true
    command: "bash"
    args:
      - -c
      - |
        sops --decrypt --input-type yaml --output-type yaml \
          ../apps/secrets/aws.enc.yaml /dev/stdin | kubectl apply -f -
  - events: ["prepare"]
    showlogs: true
    command: "bash"
    args:
      - -c
      - |
        sops --decrypt --input-type yaml --output-type yaml \
          ../apps/secrets/ghcr-credentials.enc.yaml /dev/stdin | kubectl apply -f -
  # Shared Cilium mesh trust anchor (cilium-ca in kube-system). Applied in stage 00
  # so it exists BEFORE Cilium starts in 01-bootstrap — a fresh cluster then signs
  # its clustermesh/identity certs from the shared root instead of generating its
  # own. Identical ciphertext on every cluster; NEVER regenerate (re-keys the mesh).
  #
  # The Helm ownership label/annotations let the Cilium release ADOPT this Secret
  # instead of failing with "invalid ownership metadata: ... managed-by must be
  # Helm" once clustermesh (authMode:cluster, set in clusters/<c>/mesh.yaml) makes
  # the chart manage cilium-ca. Stamped after apply — idempotent on every prepare.
  - events: ["prepare"]
    showlogs: true
    command: "bash"
    args:
      - -c
      - |
        set -euo pipefail
        sops --decrypt --input-type yaml --output-type yaml \
          ../clusters/_shared/cilium-ca.sops.yaml /dev/stdin | kubectl apply -f -
        kubectl -n kube-system label secret cilium-ca \
          app.kubernetes.io/managed-by=Helm --overwrite
        kubectl -n kube-system annotate secret cilium-ca \
          meta.helm.sh/release-name=cilium \
          meta.helm.sh/release-namespace=kube-system --overwrite
  - events: ["prepare"]
    showlogs: true
    command: "kubectl"
    args:
      - apply
      - -f
      - https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.2.0/config/crd/standard/gateway.networking.k8s.io_gatewayclasses.yaml
      - -f
      - https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.2.0/config/crd/standard/gateway.networking.k8s.io_gateways.yaml
      - -f
      - https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.2.0/config/crd/standard/gateway.networking.k8s.io_httproutes.yaml
      - -f
      - https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.2.0/config/crd/standard/gateway.networking.k8s.io_referencegrants.yaml
      - -f
      - https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.2.0/config/crd/standard/gateway.networking.k8s.io_grpcroutes.yaml
      - -f
      - https://raw.githubusercontent.com/kubernetes-sigs/gateway-api/v1.2.0/config/crd/experimental/gateway.networking.k8s.io_tlsroutes.yaml
      - -f
      - https://github.com/prometheus-operator/prometheus-operator/releases/download/v0.82.1/stripped-down-crds.yaml
      - -f
      - https://github.com/kubernetes-sigs/gateway-api-inference-extension/releases/download/v0.2.0/manifests.yaml
