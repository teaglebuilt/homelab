---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: data
resources:
  - pvc.yaml
  - job.yaml
helmCharts:
  - name: lakefs
    repo: https://charts.lakefs.io
    namespace: data
    version: 1.0.0
    releaseName: lakefs
    valuesInline:
      image:
        repository: lakefs/lakefs
        tag: v1.0.0
      lakefs:
        lakefsConfig:
          database:
            type: local
            local:
              path: /lakefs/data/lakefs.db
          blockstore:
            type: s3
              endpoint: http://minio.minio.svc.cluster.local:9000
              force_path_style: true
              discover_bucket_region: false
        existingSecret: lakefs-credentials
        extraEnvVars:
          - name: LAKEFS_BLOCKSTORE_S3_CREDENTIALS_ACCESS_KEY_ID
            valueFrom:
              secretKeyRef:
                name: lakefs-credentials
                key: minio-access-key
          - name: LAKEFS_BLOCKSTORE_S3_CREDENTIALS_SECRET_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: lakefs-credentials
                key: minio-secret-key
        extraVolumes:
          - name: lakefs-data
            persistentVolumeClaim:
              claimName: lakefs-data
        extraVolumeMounts:
          - name: lakefs-data
            mountPath: /lakefs/data
        resources:
          requests:
            memory: 256Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 500m
