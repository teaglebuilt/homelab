---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-setup
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: lakefs-setup
    app.kubernetes.io/instance: {{ .Release.Name }}
  annotations:
    # ArgoCD resource hooks (runs after sync completes)
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lakefs-setup
    spec:
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for LakeFS to be ready..."
              # Wait for LakeFS to respond
              for i in $(seq 1 60); do
                if wget -q -O/dev/null http://lakefs.{{ .Release.Namespace }}.svc.cluster.local:8000/api/v1/healthcheck 2>/dev/null; then
                  echo "LakeFS is ready!"
                  break
                fi
                echo "Attempt $i/60 - LakeFS not ready yet..."
                sleep 2
              done

              echo "Attempting LakeFS admin setup..."
              # Try to setup - will return 409 if already set up
              RESULT=$(wget -q -O- --post-data='{"username":"admin","key":{"access_key_id":"'"$LAKEFS_ACCESS_KEY_ID"'","secret_access_key":"'"$LAKEFS_SECRET_ACCESS_KEY"'"}}' \
                --header='Content-Type: application/json' \
                http://lakefs.{{ .Release.Namespace }}.svc.cluster.local:8000/api/v1/setup_lakefs 2>&1 || true)

              if echo "$RESULT" | grep -q "access_key_id"; then
                echo "LakeFS setup completed successfully!"
              elif echo "$RESULT" | grep -q "already"; then
                echo "LakeFS was already initialized."
              else
                echo "Setup result: $RESULT"
                echo "LakeFS may have been previously initialized."
              fi

              {{- if .Values.repository.enabled }}
              # Create repository
              echo "Creating LakeFS repository '{{ .Values.repository.name }}'..."
              AUTH_HEADER=$(echo -n "$LAKEFS_ACCESS_KEY_ID:$LAKEFS_SECRET_ACCESS_KEY" | base64)
              REPO_RESULT=$(wget -q -O- --post-data='{"name":"{{ .Values.repository.name }}","storage_namespace":"{{ .Values.repository.storageNamespace }}","default_branch":"{{ .Values.repository.defaultBranch }}"}' \
                --header='Content-Type: application/json' \
                --header="Authorization: Basic $AUTH_HEADER" \
                http://lakefs.{{ .Release.Namespace }}.svc.cluster.local:8000/api/v1/repositories 2>&1 || true)

              if echo "$REPO_RESULT" | grep -q '"id"'; then
                echo "Repository '{{ .Values.repository.name }}' created successfully!"
              elif echo "$REPO_RESULT" | grep -q "already exists"; then
                echo "Repository '{{ .Values.repository.name }}' already exists."
              else
                echo "Repository result: $REPO_RESULT"
              fi

              {{- range .Values.repository.branches }}
              # Create branch '{{ . }}'
              echo "Creating branch '{{ . }}'..."
              BRANCH_RESULT=$(wget -q -O- --post-data='{"name":"{{ . }}","source":"{{ $.Values.repository.defaultBranch }}"}' \
                --header='Content-Type: application/json' \
                --header="Authorization: Basic $AUTH_HEADER" \
                http://lakefs.{{ $.Release.Namespace }}.svc.cluster.local:8000/api/v1/repositories/{{ $.Values.repository.name }}/branches 2>&1 || true)

              if echo "$BRANCH_RESULT" | grep -q '"commit_id"\|"id"'; then
                echo "Branch '{{ . }}' created successfully!"
              elif echo "$BRANCH_RESULT" | grep -q "already exists"; then
                echo "Branch '{{ . }}' already exists."
              else
                echo "Branch result: $BRANCH_RESULT"
              fi
              {{- end }}
              {{- end }}

              echo "Setup job complete."
          env:
            - name: LAKEFS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: lakefs-credentials
                  key: access-key-id
            - name: LAKEFS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: lakefs-credentials
                  key: secret-access-key
