---
# Self-contained ksops generator for the postgres unit so it can be composed by
# any cluster overlay (paths are local to this directory). Moved here from the
# former top-level data secrets-generator.
apiVersion: viaduct.ai/v1
kind: ksops
metadata:
  name: ksops-postgres
  annotations:
    config.kubernetes.io/function: |
      exec:
        path: ksops
files:
  - secrets.enc.yaml
  - pg-scrapers.enc.yaml
  - pg-n8n.enc.yaml
