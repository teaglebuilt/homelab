---
apiVersion: v1
kind: PersistentVolume
metadata:
  annotations:
    pv.kubernetes.io/provisioned-by: nfs.csi.k8s.io
  name: data-platform-storage
  namespace: data
spec:
  capacity:
    storage: 500Gi
  accessModes:
    - ReadWriteMany
    - ReadWriteOnce
  storageClassName: nfs-csi
  mountOptions:
    - nolock
  csi:
    driver: nfs.csi.k8s.io
    volumeHandle: ai
    volumeAttributes:
      server: unas.internal
      share: /var/nfs/shared/data_platform
    readOnly: false
