---
apiVersion: batch/v1
kind: Job
metadata:
  name: lakefs-setup
  namespace: data
  labels:
    app.kubernetes.io/name: lakefs-setup
    app.kubernetes.io/part-of: homelab
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: lakefs-setup
    spec:
      restartPolicy: OnFailure
      containers:
        - name: setup
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Waiting for LakeFS to be ready..."
              for i in $(seq 1 60); do
                if wget -q -O/dev/null http://lakefs.data.svc.cluster.local/_health 2>/dev/null; then
                  echo "LakeFS is ready!"
                  break
                fi
                echo "Attempt $i/60 - LakeFS not ready yet..."
                sleep 2
              done

              echo "Attempting LakeFS admin setup..."
              RESULT=$(wget -q -O- --post-data="{\"username\":\"admin\",\"key\":{\"access_key_id\":\"${LAKEFS_ACCESS_KEY_ID}\",\"secret_access_key\":\"${LAKEFS_SECRET_ACCESS_KEY}\"}}" \
                --header='Content-Type: application/json' \
                http://lakefs.data.svc.cluster.local/api/v1/setup_lakefs 2>&1 || true)

              if echo "$RESULT" | grep -q "access_key_id"; then
                echo "LakeFS setup completed successfully!"
              elif echo "$RESULT" | grep -qi "already"; then
                echo "LakeFS was already initialized."
              else
                echo "Setup result: $RESULT"
                echo "LakeFS may have been previously initialized."
              fi
              echo "Setup job complete."
          env:
            - name: LAKEFS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: lakefs-credentials
                  key: access-key-id
            - name: LAKEFS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: lakefs-credentials
                  key: secret-access-key
