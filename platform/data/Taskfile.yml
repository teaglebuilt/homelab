---
version: 3

tasks:
  deploy:
    requires:
      vars: [CLUSTER]
    vars:
      KUSTOMIZE_FLAGS: --enable-helm --enable-exec --enable-alpha-plugins
      KUBECONFIG_FILE: '{{.ROOT_DIR}}/kubernetes/generated/{{.CLUSTER}}/kubeconfig'
    cmds:
      - |-
        KUBECONFIG='{{.KUBECONFIG_FILE}}' kustomize build {{.KUSTOMIZE_FLAGS}} ./data/kubernetes/overlays/{{.CLUSTER}} | kubectl apply -f -

  destroy:
    requires:
      vars: [CLUSTER]
    vars:
      KUSTOMIZE_FLAGS: --enable-helm --enable-exec --enable-alpha-plugins
      KUBECONFIG: '{{.TASKFILE_DIR}}/generated/{{.CLUSTER}}/kubeconfig'
    cmds:
      - |-
        KUBECONFIG='{{.KUBECONFIG_FILE}}' kustomize build {{.KUSTOMIZE_FLAGS}} ./data/kubernetes | kubectl delete -f -
