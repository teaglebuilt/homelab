---
version: 3

tasks:
  deploy:
    requires:
      vars: [CLUSTER]
    vars:
      KUSTOMIZE_FLAGS: --enable-helm --enable-exec --enable-alpha-plugins
      KUBECONFIG_FILE: '{{.ROOT_DIR}}/kubernetes/generated/{{.CLUSTER}}/kubeconfig'
    cmds:
      # KUBECONFIG belongs on the kubectl side of the pipe; on the kustomize side it
      # is ignored and kubectl applies to the AMBIENT context (wrong cluster).
      - |-
        kustomize build {{.KUSTOMIZE_FLAGS}} ./data/kubernetes/overlays/{{.CLUSTER}} | KUBECONFIG='{{.KUBECONFIG_FILE}}' kubectl apply -f -

  destroy:
    requires:
      vars: [CLUSTER]
    vars:
      KUSTOMIZE_FLAGS: --enable-helm --enable-exec --enable-alpha-plugins
      KUBECONFIG_FILE: '{{.ROOT_DIR}}/kubernetes/generated/{{.CLUSTER}}/kubeconfig'
    cmds:
      - |-
        kustomize build {{.KUSTOMIZE_FLAGS}} ./data/kubernetes/overlays/{{.CLUSTER}} | KUBECONFIG='{{.KUBECONFIG_FILE}}' kubectl delete -f -
