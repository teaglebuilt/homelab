---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
helmCharts:
  - name: loki
    releaseName: loki
    repo: https://grafana.github.io/helm-charts
    version: 7.0.0
    namespace: observability
    valuesInline:
      deploymentMode: SimpleScalable
      loki:
        auth_enabled: false
        commonConfig:
          replication_factor: 1
        schemaConfig:
          configs:
            - from: "2024-04-01"
              store: tsdb
              object_store: s3
              schema: v13
              index:
                prefix: loki_index_
                period: 24h
        ingester:
          chunk_encoding: snappy
        querier:
          # Increased concurrent queries for better performance
          max_concurrent: 8
        pattern_ingester:
          enabled: true
        limits_config:
          allow_structured_metadata: true
          volume_enabled: true
          # Retention and query performance settings
          retention_period: 24h
          # Per-stream rate limits (reduced for home lab)
          ingestion_rate_mb: 4
          ingestion_burst_size_mb: 6
          per_stream_rate_limit: 3MB
          per_stream_rate_limit_burst: 8MB
          # Query performance optimizations
          max_query_lookback: 24h
          max_query_length: 24h
          max_query_parallelism: 16
          max_entries_limit_per_query: 10000
          max_streams_per_user: 0
          max_global_streams_per_user: 0
        storage: {}
        # storage:
        #   type: s3
        #   bucketNames:
        #     chunks: loki-chunks
        #     ruler: loki-ruler
        #     admin: loki-admin
        #   s3:
        #     # External SeaweedFS S3 service
        #     endpoint: http://seaweedfs-s3.storage.svc.cluster.local:8333
        #     insecure: true
        #     s3ForcePathStyle: true
      backend:
        replicas: 1
        extraEnvFrom:
          - secretRef:
              name: s3-credentials
        resources:
          limits:
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 512Mi
      read:
        replicas: 1
        extraEnvFrom:
          - secretRef:
              name: s3-credentials
        resources:
          limits:
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 512Mi

      write:
        replicas: 1
        extraEnvFrom:
          - secretRef:
              name: s3-credentials
        resources:
          limits:
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 512Mi
        persistence:
          enabled: true
          storageClass: nfs-csi
          accessModes:
            - ReadWriteOnce
          size: 20Gi

        chunksCache:
          enabled: true
          # Optimized for namespace quota (18Gi total)
          allocatedMemory: 512
          resources:
            limits:
              memory: 1Gi
            requests:
              cpu: 100m
              memory: 512Mi
        resultsCache:
          enabled: true
          # Query result caching for better performance
          allocatedMemory: 256
          resources:
            limits:
              memory: 512Mi
            requests:
              cpu: 50m
              memory: 256Mi
