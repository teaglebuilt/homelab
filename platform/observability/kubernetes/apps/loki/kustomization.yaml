---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
helmCharts:
  - name: loki
    releaseName: loki
    repo: https://grafana.github.io/helm-charts
    version: 7.0.0
    namespace: observability
    valuesInline:
      deploymentMode: SingleBinary
      loki:
        auth_enabled: false
        commonConfig:
          replication_factor: 1
        schemaConfig:
          configs:
            - from: "2024-04-01"
              store: tsdb
              object_store: s3
              schema: v13
              index:
                prefix: loki_index_
                period: 24h
        ingester:
          chunk_encoding: snappy
        pattern_ingester:
          enabled: true
        limits_config:
          # Required so OTLP logs keep trace_id/span_id as structured metadata,
          # which powers the Loki -> Tempo derived-field correlation.
          allow_structured_metadata: true
          volume_enabled: true
          retention_period: 24h
          ingestion_rate_mb: 4
          ingestion_burst_size_mb: 6
          per_stream_rate_limit: 3MB
          per_stream_rate_limit_burst: 8MB
          max_query_lookback: 24h
          max_query_length: 24h
          max_query_parallelism: 16
          max_entries_limit_per_query: 10000
        storage:
          type: s3
          bucketNames:
            chunks: loki-chunks
            ruler: loki-ruler
            admin: loki-admin
          s3:
            # External SeaweedFS S3 service. Credentials come from the
            # s3-credentials secret via singleBinary.extraEnvFrom below.
            endpoint: http://seaweedfs-s3.storage.svc.cluster.local:8333
            insecure: true
            s3ForcePathStyle: true
      singleBinary:
        replicas: 1
        extraEnvFrom:
          - secretRef:
              name: s3-credentials
        persistence:
          enabled: true
          # Local scratch only (WAL / boltdb cache / compactor workdir). Durable
          # log data lives in S3 (SeaweedFS), so this is node-local disk, not NFS.
          storageClass: local-path
          accessModes:
            - ReadWriteOnce
          size: 20Gi
        resources:
          limits:
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 512Mi
      # SingleBinary mode: keep the SimpleScalable components scaled to zero.
      read:
        replicas: 0
      write:
        replicas: 0
      backend:
        replicas: 0
      # Memcached caches are overkill at this scale.
      chunksCache:
        enabled: false
      resultsCache:
        enabled: false
      # nginx gateway fronts both push (/otlp/v1/logs) and query; the otel-collector
      # and the Grafana Loki datasource both target loki-gateway.
      gateway:
        enabled: true
      # Canary + self-monitoring add pods we don't need in a homelab.
      lokiCanary:
        enabled: false
      test:
        enabled: false
generators:
  - s3-credentials-generator.yaml
