---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - otel-collector.yaml
  - service.yaml
helmCharts:
  - name: opentelemetry-operator
    releaseName: open-telemetry
    repo: https://open-telemetry.github.io/opentelemetry-helm-charts
    version: 0.114.1
    namespace: observability
    includeCRDs: true
    valuesInline:
      manager:
        collectorImage:
          repository: otel/opentelemetry-collector-k8s
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 256Mi
      admissionWebhooks:
        certManager:
          enabled: false
        autoGenerateCert:
          enabled: true
