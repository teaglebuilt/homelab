---
# Cilium ClusterMesh global service for the otel-collector.
#
# The collector runs only on `application`, but its consumers (kagent +
# agentgateway) run on `mlops`, so they reach it cross-cluster. The OTel
# operator's own `otel-collector-collector` Service cannot carry the global
# annotation (the OpenTelemetryCollector CRD has no service-annotation field),
# so this is a separate, hand-managed Service that selects the same collector
# pods and is annotated as a Cilium global service.
#
# It is deployed to BOTH clusters with the same name+namespace:
#   - application: the selector matches the local collector pod (real backends)
#   - mlops:       no local pod matches, so Cilium routes to the remote endpoints
#
# NOTE: the selector must match the operator-created collector pod labels. Verify
#       with: kubectl -n observability get pod -l app.kubernetes.io/component=opentelemetry-collector --show-labels
apiVersion: v1
kind: Service
metadata:
  name: otel-collector-mesh
  namespace: observability
  labels:
    app.kubernetes.io/name: otel-collector-mesh
    app.kubernetes.io/part-of: homelab
  annotations:
    service.cilium.io/global: "true"
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/managed-by: opentelemetry-operator
    app.kubernetes.io/component: opentelemetry-collector
    app.kubernetes.io/instance: observability.otel-collector
  ports:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP
