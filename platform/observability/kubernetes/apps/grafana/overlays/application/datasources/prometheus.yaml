---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus
  namespace: observability
spec:
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasource:
    name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    orgId: 1
    url: http://prometheus-community-kube-prometheus.observability:9090
    basicAuth: false
    # Chart-provisioned default datasource is disabled (kube-prometheus-stack
    # grafana.sidecar.datasources.defaultDatasourceEnabled: false), so the
    # operator-managed Prometheus datasource is the cluster default.
    isDefault: true
    editable: true
    jsonData:
      httpMethod: GET
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo
