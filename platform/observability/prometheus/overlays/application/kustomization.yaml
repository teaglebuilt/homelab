---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability
helmCharts:
  - name: kube-prometheus-stack
    repo: https://prometheus-community.github.io/helm-charts
    version: 61.7.1
    namespace: observability
    releaseName: prometheus-community
    additionalValuesFiles:
      - values.yaml
      - prometheus-operator.yaml
    valuesInline:
      nodeExporter:
        enabled: false
      kubernetesServiceMonitors:
        enabled: false
      crds:
        enabled: true
      alertmanager:
        enabled: true
      grafana:
        # TODO(user): admin creds via SOPS secret, persistence, HTTPRoute hostname.
        enabled: true
      kubeStateMetrics:
        enabled: true    # central wants cluster-state metrics
      kubeApiServer:
        enabled: false
      coreDns:
        enabled: false
      kubeDns:
        enabled: false
      kubeEtcd:
        enabled: false
      kubeControllerManager:
        enabled: false
      kubeScheduler:
        enabled: false
      kubeProxy:
        enabled: false
      kubelet:
        enabled: false
