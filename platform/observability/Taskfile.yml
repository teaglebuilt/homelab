---
version: 3

vars:
  KUSTOMIZE_FLAGS: --enable-helm --enable-exec --enable-alpha-plugins
  TERRAFORM: tofu -chdir=terraform

tasks:
  deploy:
    dir: observability
    summary: Deploy the per-cluster observability stack (CLUSTER=mlops|application)
    vars:
      CLUSTER: '{{.CLUSTER | default "mlops"}}'
      KUBECONFIG_FILE: '{{.TASKFILE_DIR}}/../../kubernetes/generated/{{.CLUSTER}}/kubeconfig'
    preconditions:
      - sh: test -d overlays/{{.CLUSTER}}
        msg: "No observability overlay for cluster '{{.CLUSTER}}' — expected platform/observability/overlays/{{.CLUSTER}}/"
      - sh: test -f {{.KUBECONFIG_FILE}}
        msg: "kubeconfig missing at {{.KUBECONFIG_FILE}} — bootstrap {{.CLUSTER}} first."
    cmds:
      - |-
        kustomize build {{.KUSTOMIZE_FLAGS}} overlays/{{.CLUSTER}} \
          | KUBECONFIG='{{.KUBECONFIG_FILE}}' kubectl apply -f -

  destroy:
    dir: observability
    cmds:
      - |-
        kustomize build {{.KUSTOMIZE_FLAGS}} . | kubectl delete -f -

  provision:
    dir: observability
    summary: Provision observability stack via OpenTofu (requires .env or direnv)
    # preconditions:
    #   - sh: 'test -n "$PORTAINER_IP" && test -n "$PORTAINER_API_KEY"'
    #     msg: "Set PORTAINER_IP and PORTAINER_API_KEY in .env (see downloads stack) or export via direnv"
    cmds:
      - |-
        {{.TERRAFORM}} init
      - |-
        {{.TERRAFORM}} plan \
          -var portainer_ip="$PORTAINER_IP" \
          -var portainer_api_key="$PORTAINER_API_KEY" \
          -var grafana_username="$GRAFANA_USERNAME" \
          -var grafana_password="$GRAFANA_PASSWORD" \
          -var influxdb_admin_username="$INFLUXDB_ADMIN_USERNAME" \
          -var influxdb_admin_password="$INFLUXDB_ADMIN_PASSWORD" \
          -var influxdb_admin_token="$INFLUXDB_ADMIN_TOKEN" \
          -var influxdb_org="$INFLUXDB_ORG" \
          -var influxdb_bucket="$INFLUXDB_BUCKET" \
          -var graylog_password_secret="$GRAYLOG_PASSWORD_SECRET" \
          -var graylog_root_password_sha="$GRAYLOG_ROOT_PASSWORD_SHA"
      - |-
        {{.TERRAFORM}} apply -auto-approve \
          -var portainer_ip="$PORTAINER_IP" \
          -var portainer_api_key="$PORTAINER_API_KEY" \
          -var grafana_username="$GRAFANA_USERNAME" \
          -var grafana_password="$GRAFANA_PASSWORD" \
          -var influxdb_admin_username="$INFLUXDB_ADMIN_USERNAME" \
          -var influxdb_admin_password="$INFLUXDB_ADMIN_PASSWORD" \
          -var influxdb_admin_token="$INFLUXDB_ADMIN_TOKEN" \
          -var influxdb_org="$INFLUXDB_ORG" \
          -var influxdb_bucket="$INFLUXDB_BUCKET" \
          -var graylog_password_secret="$GRAYLOG_PASSWORD_SECRET" \
          -var graylog_root_password_sha="$GRAYLOG_ROOT_PASSWORD_SHA"

  destroy:
    dir: observability
    cmds:
      - |-
        {{.TERRAFORM}} destroy -auto-approve \
          -var portainer_ip="$PORTAINER_IP" \
          -var portainer_api_key="$PORTAINER_API_KEY" \
          -var grafana_username="$GRAFANA_USERNAME" \
          -var grafana_password="$GRAFANA_PASSWORD" \
          -var influxdb_admin_username="$INFLUXDB_ADMIN_USERNAME" \
          -var influxdb_admin_password="$INFLUXDB_ADMIN_PASSWORD" \
          -var influxdb_admin_token="$INFLUXDB_ADMIN_TOKEN" \
          -var influxdb_org="$INFLUXDB_ORG" \
          -var influxdb_bucket="$INFLUXDB_BUCKET" \
          -var graylog_password_secret="$GRAYLOG_PASSWORD_SECRET" \
          -var graylog_root_password_sha="$GRAYLOG_ROOT_PASSWORD_SHA"
