---
# AgentgatewayBackend: OpenAI-compatible (Ollama). gateway.kgateway.dev Backend does not support spec.ai.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: ollama
  namespace: ai
spec:
  ai:
    provider:
      openai:
        model: mistral
      host: ollama.ai.svc.cluster.local
      port: 11434
  # Optional: create a secret with key Authorization and value "Bearer dev" if auth required
  # policies:
  #   auth:
  #     secretRef:
  #       name: ollama-api-key
