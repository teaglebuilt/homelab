---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: comfyui
  namespace: ai
  labels:
    app: comfyui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: comfyui
  template:
    metadata:
      labels:
        app: comfyui
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        nvidia.com/gpu.present: "true"
      imagePullSecrets:
        - name: ghcr-secret
      initContainers:
        - name: comfyui-downloader
          image: ghcr.io/nextgensolutions-llc/comfyui:test
          imagePullPolicy: Always
          command: ["/bin/sh", "/app/scripts/download-data.sh"]
          volumeMounts:
            - name: comfyui-data
              mountPath: /app/models
              subPath: models
            - name: comfyui-data
              mountPath: /app/custom_nodes
              subPath: custom_nodes
            - name: comfyui-data
              mountPath: /app/input
              subPath: input
            - name: comfyui-data
              mountPath: /app/output
              subPath: output
            - name: comfyui-data
              mountPath: /app/user
              subPath: user
            - name: comfyui-scripts
              mountPath: /app/scripts
              readOnly: true
      containers:
        - name: comfyui
          image: ghcr.io/nextgensolutions-llc/comfyui:test
          imagePullPolicy: Always
          workingDir: /app
          command: ["/bin/sh", "/app/scripts/start-comfyui.sh"]
          ports:
            - containerPort: 8188
              name: http
          resources:
            limits:
              nvidia.com/gpu: 1
          volumeMounts:
            - name: comfyui-data
              mountPath: /app/models
              subPath: models
            - name: comfyui-data
              mountPath: /app/custom_nodes
              subPath: custom_nodes
            - name: comfyui-data
              mountPath: /app/input
              subPath: input
            - name: comfyui-data
              mountPath: /app/output
              subPath: output
            - name: comfyui-data
              mountPath: /app/user
              subPath: user
            - name: comfyui-scripts
              mountPath: /app/scripts
              readOnly: true
      volumes:
        - name: comfyui-data
          persistentVolumeClaim:
            claimName: comfyui-models
        - name: comfyui-scripts
          configMap:
            name: comfyui-scripts
            defaultMode: 0755
