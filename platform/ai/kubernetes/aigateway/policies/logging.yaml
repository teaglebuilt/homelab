---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: logging-policy
  namespace: ai
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: ai-gateway
  accessLog:
  - openTelemetry:
      grpcService:
        # Local mlops agent collector — agentgateway endpoint discovery can't resolve
        # Cilium global-service backends (otel-collector-mesh has no EndpointSlice on
        # mlops), so producers must target the local agent, which forwards to the
        # application collector -> Loki. Same reasoning as the tracing policy.
        backendRef:
          name: otel-agent-collector
          namespace: observability
          port: 4317
        logName: "http-gateway-access-logs"
      body: >-
        "%REQ(:METHOD)% %REQ(X-ENVOY-ORIGINAL-PATH?:PATH)% %RESPONSE_CODE% "%REQ(:AUTHORITY)%" "%UPSTREAM_CLUSTER%"'
