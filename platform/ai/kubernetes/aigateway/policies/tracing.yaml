apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: tracing-policy
  namespace: ai
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: agentgateway
  frontend:
    tracing:
      backendRef:
        name: otel-collector-collector
        namespace: monitoring
        port: 4317
      protocol: GRPC
