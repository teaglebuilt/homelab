---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: tracing-policy
  namespace: ai
spec:
  targetRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: ai-gateway
  frontend:
    tracing:
      backendRef:
        name: otel-agent-collector
        namespace: observability
        port: 4317
      protocol: GRPC
      # Sample every request so traces actually emit. Lower to a ratio
      # (e.g. "0.1" for 10%) once the pipeline is verified end-to-end.
      randomSampling: "true"
