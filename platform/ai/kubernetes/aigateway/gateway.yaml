---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ai-gateway
  namespace: ai
spec:
  gatewayClassName: agentgateway
  # Applies the OTel exporter env + tracing rawConfig from the
  # AgentgatewayParameters to this gateway's data plane.
  infrastructure:
    parametersRef:
      name: agentgateway-otel
      group: agentgateway.dev
      kind: AgentgatewayParameters
  listeners:
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: Same
  - name: https
    port: 443
    protocol: HTTPS
    tls:
      mode: Terminate
      certificateRefs:
        - kind: Secret
          name: internal-certificate-tls
    allowedRoutes:
      namespaces:
        from: Same
