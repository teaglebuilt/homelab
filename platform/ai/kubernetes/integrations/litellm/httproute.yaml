---
# Claude Code: ANTHROPIC_BASE_URL=http://${AI_GATEWAY_IP}/nim-claude
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: litellm-nim-claude
  namespace: ai
  labels:
    app: litellm-nim
    component: llm-proxy
spec:
  parentRefs:
    - name: ai-gateway
      namespace: ai
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /nim-claude
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /
      backendRefs:
        - name: litellm-nim
          port: 4000
