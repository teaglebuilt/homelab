---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: comfyui-route
  namespace: ai
  annotations:
    external-dns.alpha.kubernetes.io/hostname: comfyui.homelab.internal
spec:
  parentRefs:
    - name: homelab-internal-gateway
      namespace: kube-system
  hostnames:
    - comfyui.homelab.internal
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: comfyui
          port: 80
