---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ai
resources:
  - namespace.yaml
  - aigateway
  - llm-providers
  - integrations
  - mcp
  - ui-http-route.yaml
  - mcp-backend.yaml
  - mcp-route.yaml
  - referencegrant-automation-to-mcp.yaml
helmGlobals:
  chartHome: ./charts
helmCharts:
  - name: agentgateway
    releaseName: agentgateway
    version: v2.2.1
    namespace: ai
  - name: kagent
    releaseName: kagent
    namespace: ai
    valuesInline:
      kmcp:
        enabled: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containerSecurityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
        readOnlyRootFilesystem: true
      providers:
        default: openAI
        openAI:
          provider: OpenAI
          model: "gpt-4o-mini"
          apiKeySecretRef: openai-api-key-secret
          apiKeySecretKey: Authorization
        ollama:
          provider: Ollama
          model: "llama3.2"
          config:
            host: ollama.ai.svc.cluster.local:11434
      controller:
        substrate:
          enabled: true
          ateApiEndpoint: "dns:///api.ate-system.svc:443"
          ateApiInsecure: true
      substrateWorkerPool:
        create: true
      agents:
        istio-agent:
          enabled: false
        argo-rollouts-agent:
          enabled: false
        helm-agent:
          enabled: false
      otel:
        tracing:
          enabled: false
          exporter:
            otlp:
              endpoint: http://otel-collector-collector-headless.monitoring.svc.cluster.local:4317
              timeout: 15
              insecure: true
        logging:
          enabled: false
          exporter:
            otlp:
              endpoint: http://otel-collector-collector-headless.monitoring.svc.cluster.local:4317
              timeout: 15
              insecure: true
