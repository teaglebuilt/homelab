---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ai
resources:
  - github.yaml
  - memory.yaml
  - context7.yaml
generators:
  - secrets-generator.yaml
replacements:
  - source:
      kind: Secret
      name: github-mcp-token
      fieldPath: stringData.GITHUB_PERSONAL_ACCESS_TOKEN
    targets:
      - select:
          kind: MCPServer
          name: github-mcp-server
        fieldPaths:
          - spec.deployment.env.GITHUB_PERSONAL_ACCESS_TOKEN
