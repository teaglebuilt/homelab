---
version: 3

vars:
  KUSTOMIZE_FLAGS: --enable-helm --enable-exec --enable-alpha-plugins
  AI_NAMESPACE: ai

tasks:
  adopt-crds:
    desc: Label existing CRDs so Helm can adopt them
    internal: true
    vars:
      CLUSTER: '{{.CLUSTER | default "mlops"}}'
      KUBECONFIG_FILE: '{{.ROOT_DIR}}/kubernetes/generated/{{.CLUSTER}}/kubeconfig'
    cmds:
      - |
        export KUBECONFIG='{{.KUBECONFIG_FILE}}'
        for crd in $(kubectl get crds -o name | grep -E 'agentgateway\.dev|kgateway\.dev'); do
          kubectl label "$crd" app.kubernetes.io/managed-by=Helm --overwrite
          kubectl annotate "$crd" meta.helm.sh/release-name=agentgateway-crds meta.helm.sh/release-namespace=ai --overwrite
        done
      - |
        export KUBECONFIG='{{.KUBECONFIG_FILE}}'
        for crd in $(kubectl get crds -o name | grep 'kagent\.dev'); do
          kubectl label "$crd" app.kubernetes.io/managed-by=Helm --overwrite
          kubectl annotate "$crd" meta.helm.sh/release-name=kagent-crds meta.helm.sh/release-namespace=ai --overwrite
        done

  install-crds:
    desc: Install CRDs from agentgateway-crds and kagent Helm charts
    vars:
      CLUSTER: '{{.CLUSTER | default "mlops"}}'
      KUBECONFIG_FILE: '{{.ROOT_DIR}}/kubernetes/generated/{{.CLUSTER}}/kubeconfig'
    cmds:
      - task: adopt-crds
        vars: { CLUSTER: '{{.CLUSTER}}' }
      - echo "Installing agentgateway-crds..."
      - |
        KUBECONFIG='{{.KUBECONFIG_FILE}}' helm upgrade --install agentgateway-crds \
          oci://ghcr.io/kgateway-dev/charts/agentgateway-crds \
          --version v2.2.1 \
          --namespace ai \
          --create-namespace \
          --wait
      - echo "Installing kagent-crds..."
      - |
        KUBECONFIG='{{.KUBECONFIG_FILE}}' helm upgrade --install kagent-crds \
          oci://ghcr.io/kagent-dev/kagent/helm/kagent-crds \
          --namespace ai \
          --wait

  deploy:
    dir: ai
    desc: Deploy AI platform (GPU/mlops-only; skipped on other clusters)
    vars:
      KUBECONFIG_FILE: '{{.ROOT_DIR}}/kubernetes/generated/mlops/kubeconfig'
    status:
      # AI platform only runs where there's a GPU (mlops). Treat as up-to-date
      # (skip, no error) elsewhere so the parent can call this directly.
      - test "{{.CLUSTER}}" != "mlops"
    cmds:
      - task: install-crds
        vars: { CLUSTER: 'mlops' }
      # KUBECONFIG must be on the kubectl side of the pipe — on the kustomize side
      # it does nothing and kubectl applies to the AMBIENT context (wrong cluster).
      - |-
        KUBECONFIG='{{.KUBECONFIG_FILE}}' kustomize build {{.KUSTOMIZE_FLAGS}} kubernetes | kubectl apply -n {{.AI_NAMESPACE}} -f -

  destroy:
    dir: ai
    vars:
      CLUSTER: '{{.CLUSTER | default "mlops"}}'
      KUBECONFIG_FILE: '{{.ROOT_DIR}}/kubernetes/generated/{{.CLUSTER}}/kubeconfig'
    cmds:
      - |-
        kustomize build {{.KUSTOMIZE_FLAGS}} kubernetes | KUBECONFIG='{{.KUBECONFIG_FILE}}' kubectl delete -n {{.AI_NAMESPACE}} -f -

  test:
    cmds:
      - |-
        curl --insecure http://ai.homelab.internal/api/generate -d '{ "model": "qwen2.5-coder:latest", "prompt": "How are you today?", "stream": false}'

  check-gpu:
    cmds:
      - kubectl describe node mlops-work-00 | grep -A5 "Capacity"

  create-nvcr-secret:
    vars:
      CLUSTER: '{{.CLUSTER | default "mlops"}}'
      KUBECONFIG_FILE: '{{.ROOT_DIR}}/kubernetes/generated/{{.CLUSTER}}/kubeconfig'
    cmds:
      - |-
        KUBECONFIG='{{.KUBECONFIG_FILE}}' kubectl create secret docker-registry ngc-secret -n ai \
          --docker-server=nvcr.io \
          --docker-username='$oauthtoken' \
          --docker-password='{{.NGC_API_KEY}}'
