---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - gateway.yaml
  - storage
  - llm-providers
  - integrations
  - ui-http-route.yaml
  - mcp-route.yaml
  - referencegrant-automation-to-mcp.yaml
helmGlobals:
  chartHome: ./charts
helmCharts:
  - name: agentgateway-crds
    releaseName: agentgateway-crds
    version: v2.2.1
    namespace: ai
  - name: agentgateway
    releaseName: agentgateway
    version: v2.2.1
    namespace: ai
  - name: kagent
    releaseName: kagent
    namespace: ai
    valuesInline:
      kmcp:
        enabled: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
      containerSecurityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
        readOnlyRootFilesystem: true
      providers:
        default: openAI
        openAI:
          provider: OpenAI
          model: "gpt-4o-mini"
          apiKeySecretRef: openai-api-key-secret
          apiKeySecretKey: Authorization
        ollama:
          provider: Ollama
          model: "llama3.2"
          config:
            host: ollama.ai.svc.cluster.local:11434
