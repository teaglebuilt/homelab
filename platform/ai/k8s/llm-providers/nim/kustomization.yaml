---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ai
resources:
  - nim-storage-pv.yaml
  - nim-pvc.yaml
  - backend.yaml
  - nim-httproute.yaml
  - models
generators:
  - secrets-generator.yaml
helmCharts:
  - name: nim-llm
    releaseName: nim
    namespace: ai
    includeCRDs: true
    valuesInline:
      image:
        # NVIDIA NIM for LLMs - Llama 3.1 8B Instruct
        # Change repository to deploy different models:
        # - nvcr.io/nim/meta/llama-3.1-8b-instruct (default, single GPU)
        # - nvcr.io/nim/meta/llama-3.1-70b-instruct (4 GPUs)
        # - nvcr.io/nim/meta/llama-3.2-3b-instruct (small model)
        # - nvcr.io/nim/mistralai/mistral-7b-instruct-v0.3 (Mistral)
        repository: nvcr.io/nim/meta/llama-3.2-3b-instruct
        tag: "1.10.1"  # Requires CUDA 12.8+ / Driver 560+ (Talos v1.11.5)
      imagePullSecrets:
        - name: ngc-registry-secret
      model:
        ngcAPISecret: ngc-api-secret
      terminationGracePeriodSeconds: 60
      resources:
        requests:
          cpu: "4"
          memory: "8Gi"
          nvidia.com/gpu: 1
        limits:
          cpu: "8"
          memory: "16Gi"
          nvidia.com/gpu: 1
      persistence:
        enabled: true
        existingClaim: nim-pvc
        accessMode: ReadWriteMany
        size: 200Gi
        storageClass: nfs-csi
      nodeSelector:
        nvidia.com/gpu.present: "true"
      runtimeClassName: nvidia
      service:
        type: ClusterIP
        port: 8000
        name: nim
      startupProbe:
        enabled: true
        initialDelaySeconds: 60
        periodSeconds: 30
        failureThreshold: 60  # Allow up to 30 minutes for model loading
      readinessProbe:
        enabled: true
        initialDelaySeconds: 30
        periodSeconds: 10
      livenessProbe:
        enabled: true
        initialDelaySeconds: 60
        periodSeconds: 30
      podSecurityContext:
        fsGroup: 1000
        runAsUser: 1000
        runAsGroup: 1000
      securityContext:
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      env:
        - name: NIM_SERVER_PORT
          value: "8000"
        - name: NIM_LOG_LEVEL
          value: "INFO"
        - name: NIM_CACHE_PATH
          value: /opt/nim/.cache
        - name: NIM_MODEL_NAME
          value: "meta/llama-3.2-3b-instruct"
        - name: NIM_MAX_MODEL_LEN
          value: "4096"  # Reduced from 131K to fit RTX 4070 Super 12GB VRAM, 16384 for 10GB VRAM, currently 8GB VRAM
        # RTX 4070 SUPER (12GB) headroom tuning: weights (6.02 GiB) + KV cache (3.19 GiB)
        # + activation peak (1.19 GiB) already fill the 10.45 GiB budget from
        # gpu_memory_utilization=0.9, leaving no room for cudagraph capture (OOM on startup).
        # Per NIM memory troubleshooting docs: disable cudagraphs + use expandable segments.
        # https://docs.nvidia.com/nim/large-language-models/latest/troubleshooting/memory.html
        - name: NIM_DISABLE_CUDA_GRAPH
          value: "1"
        - name: PYTORCH_ALLOC_CONF
          value: "expandable_segments:True"
        - name: NIM_KV_CACHE_PERCENT
          value: "0.80"
        - name: NIM_MAX_NUM_SEQS
          value: "16"
      # podAnnotations:
      #   kubernetes.io/egress-bandwidth: "1G"
      #   kubernetes.io/ingress-bandwidth: "1G"
helmGlobals:
  chartHome: ./charts
