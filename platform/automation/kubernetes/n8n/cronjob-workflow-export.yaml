---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: n8n-workflow-backup
  namespace: automation
  labels:
    app.kubernetes.io/name: n8n-workflow-backup
    app.kubernetes.io/component: n8n
spec:
  schedule: "0 */6 * * *"
  timeZone: America/New_York
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      ttlSecondsAfterFinished: 86400
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            fsGroup: 1000
          nodeSelector:
            kubernetes.io/hostname: mlops-work-01
          initContainers:
            - name: export
              image: ghcr.io/n8n-io/n8n:latest
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  mkdir -p /backup/workflows /backup/credentials

                  # `--backup` writes one file per entity as <output>/<id>.json.
                  # Workflows and credentials go into separate subdirs so the
                  # import-on-bootstrap script can distinguish them (n8n CLI does not).
                  n8n export:workflow --all --backup --output=/backup/workflows
                  n8n export:credentials --all --backup --output=/backup/credentials

                  wf_count="$(find /backup/workflows -maxdepth 1 -type f -name '*.json' 2>/dev/null | wc -l | tr -d ' ')"
                  cred_count="$(find /backup/credentials -maxdepth 1 -type f -name '*.json' 2>/dev/null | wc -l | tr -d ' ')"
                  if [ "${wf_count}" = "0" ] && [ "${cred_count}" = "0" ]; then
                    echo "Postgres has no workflows or credentials; nothing to back up"
                    exit 0
                  fi
                  echo "Backup ready: ${wf_count} workflow(s), ${cred_count} credential(s) in /backup"
              envFrom:
                - configMapRef:
                    name: n8n-config
                - secretRef:
                    name: n8n-secrets
              env:
                - name: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
                  value: "false"
                - name: DB_POSTGRESDB_USER
                  valueFrom:
                    secretKeyRef:
                      name: pg-n8n-secret
                      key: username
                - name: DB_POSTGRESDB_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: pg-n8n-secret
                      key: password
              volumeMounts:
                - name: backup
                  mountPath: /backup
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                runAsNonRoot: true
                runAsUser: 1000
                seccompProfile:
                  type: RuntimeDefault
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: "1"
                  memory: 512Mi
          containers:
            - name: upload
              image: public.ecr.aws/aws-cli/aws-cli:2.27.38
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - -c
                - |
                  set -e
                  echo "Contents of /backup:"
                  find /backup -type f 2>/dev/null | head -20 || true
                  file_count="$(find /backup -type f 2>/dev/null | wc -l | tr -d ' ')"
                  if [ "${file_count}" = "0" ]; then
                    echo "No files in /backup; skipping S3 upload (export initContainer may have found nothing)"
                    exit 0
                  fi
                  bucket="${WORKFLOWS_S3_BUCKET:?}"
                  prefix="${WORKFLOWS_S3_PREFIX:-n8n/workflows}"
                  dest="s3://${bucket}/${prefix}/"
                  echo "Uploading ${file_count} file(s) from /backup to ${dest}"
                  aws s3 sync /backup/ "${dest}" --delete
                  echo "S3 listing after sync:"
                  aws s3 ls "${dest}" | head -20
              envFrom:
                - configMapRef:
                    name: n8n-config
              env:
                # Same bucket key as deployment download-workflows initContainer
                - name: WORKFLOWS_S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: aws-credentials
                      key: aws_homelab_remote_state_backup
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: aws-credentials
                      key: aws_access_key_id
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: aws-credentials
                      key: aws_secret_access_key
                - name: AWS_DEFAULT_REGION
                  value: us-east-1
              volumeMounts:
                - name: backup
                  mountPath: /backup
                  readOnly: true
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                runAsNonRoot: true
                runAsUser: 1000
                seccompProfile:
                  type: RuntimeDefault
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 128Mi
          volumes:
            - name: backup
              emptyDir: {}
