apiVersion: v1
kind: ConfigMap
metadata:
  name: n8n-config
  namespace: automation
  labels:
    version: v1.0
data:
  DB_TYPE: postgresdb
  DB_POSTGRESDB_HOST: postgres-rw.data.svc.cluster.local
  DB_POSTGRESDB_PORT: "5432"
  DB_POSTGRESDB_DATABASE: n8n
  # Workflow JSON definitions: s3://<bucket>/n8n/workflows/ via CronJobs (not N8N_EXTERNAL_STORAGE_S3_*).
  WORKFLOWS_S3_PREFIX: n8n/workflows
  N8N_DIAGNOSTICS_ENABLED: "false"
  N8N_PERSONALIZATION_ENABLED: "false"
