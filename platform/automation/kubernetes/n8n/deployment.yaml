---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n
  namespace: automation
  labels:
    app: n8n
    version: v1.0
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: n8n
        version: v1.0
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      nodeSelector:
        kubernetes.io/hostname: mlops-work-01
      initContainers:
        - name: download-workflows
          image: public.ecr.aws/aws-cli/aws-cli:2.27.38
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              set -e
              bucket="${WORKFLOWS_S3_BUCKET:?}"
              prefix="${WORKFLOWS_S3_PREFIX:-n8n/workflows}"
              src="s3://${bucket}/${prefix}/"
              echo "Syncing ${src} to /workflow-backup"
              mkdir -p /workflow-backup
              aws s3 sync "${src}" /workflow-backup/ || true
          envFrom:
            - configMapRef:
                name: n8n-config
          env:
            - name: WORKFLOWS_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: aws_homelab_remote_state_backup
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: aws_access_key_id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: aws_secret_access_key
            - name: AWS_DEFAULT_REGION
              value: us-east-1
          volumeMounts:
            - name: workflow-backup
              mountPath: /workflow-backup
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
        - name: wait-for-postgres
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/scripts/db-health.sh"]
          envFrom:
            - configMapRef:
                name: n8n-config
          volumeMounts:
            - name: n8n-scripts
              mountPath: /scripts
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
        - name: import-workflows
          image: ghcr.io/n8n-io/n8n:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/scripts/import-workflows.sh"]
          envFrom:
            - configMapRef:
                name: n8n-config
            - secretRef:
                name: n8n-secrets
          env:
            - name: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
              value: "false"
            - name: DB_POSTGRESDB_USER
              valueFrom:
                secretKeyRef:
                  name: pg-n8n-secret
                  key: username
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-n8n-secret
                  key: password
          volumeMounts:
            - name: workflow-backup
              mountPath: /workflow-backup
              readOnly: true
            - name: n8n-scripts
              mountPath: /scripts
              readOnly: true
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
            runAsUser: 1000
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
      containers:
        - name: n8n
          image: ghcr.io/n8n-io/n8n:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5678
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            requests:
              cpu: 150m
              memory: 512Mi
            limits:
              cpu: 550m
              memory: 768Mi
          envFrom:
            - configMapRef:
                name: n8n-config
            - secretRef:
                name: n8n-secrets
          env:
            - name: N8N_METRICS
              value: "true"
            - name: N8N_SECURE_COOKIE
              value: "false"
            - name: N8N_HOST
              value: n8n.homelab.internal
            # - name: N8N_EDITOR_BASE_URL
            #   value: https://n8n.teaglebuilt.tech
            - name: WEBHOOK_URL
              value: https://n8n.teaglebuilt.tech
            - name: N8N_PROTOCOL
              value: https
            - name: N8N_PROXY_HOPS
              value: "1"
            - name: N8N_ONBOARDING_FLOW_DISABLED
              value: "true"
            - name: N8N_VERSION_NOTIFICATIONS_ENABLED
              value: "false"
            - name: N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS
              value: "true"
            - name: DB_POSTGRESDB_USER
              valueFrom:
                secretKeyRef:
                  name: pg-n8n-secret
                  key: username
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-n8n-secret
                  key: password
            - name: DB_POSTGRESDB_POOL_SIZE
              value: "5"
            - name: N8N_RUNNERS_ENABLED
              value: "true"
            - name: N8N_BLOCK_ENV_ACCESS_IN_NODE
              value: "false"
            - name: N8N_GIT_NODE_DISABLE_BARE_REPOS
              value: "true"
            - name: N8N_AVAILABLE_BINARY_DATA_MODES
              value: s3,filesystem
            - name: N8N_DEFAULT_BINARY_DATA_MODES
              value: s3
            - name: N8N_EXTERNAL_STORAGE_S3_HOST
              value: "s3.us-east-1.amazonaws.com"
            - name: N8N_EXTERNAL_STORAGE_S3_BUCKET_NAME
              valueFrom:
                secretKeyRef:
                  name: n8n-secrets
                  key: WORKFLOWS_BUCKET_NAME
            - name: N8N_EXTERNAL_STORAGE_S3_BUCKET_REGION
              value: "us-east-1"
            - name: N8N_EXTERNAL_STORAGE_S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: aws_access_key_id
            - name: N8N_EXTERNAL_STORAGE_S3_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: aws-credentials
                  key: aws_secret_access_key
          volumeMounts:
            - name: n8n-storage
              mountPath: /home/node/.n8n
            - name: shared-data
              mountPath: /data/shared
      volumes:
        - name: n8n-storage
          persistentVolumeClaim:
            claimName: n8n-storage-pvc
        - name: shared-data
          emptyDir: {}
        - name: workflow-backup
          emptyDir: {}
        - name: n8n-scripts
          configMap:
            name: n8n-scripts
