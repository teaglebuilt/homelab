---
version: 3

vars:
  KUSTOMIZE_FLAGS: --enable-helm --enable-exec --enable-alpha-plugins
  SCRAPER_IMAGE: ghcr.io/nextgensolutions-llc/scrapers
  SCRAPER_TAG:
    sh: git rev-parse --short HEAD

tasks:
  deploy:
    desc: Deploy automation stack (mlops-only; skipped on other clusters)
    vars:
      CLUSTER: '{{.CLUSTER | default "mlops"}}'
    status:
      - test "{{.CLUSTER}}" != "mlops"
    cmds:
      - |-
        kustomize build {{.KUSTOMIZE_FLAGS}} ./automation/kubernetes | kubectl apply -f -

  destroy:
    cmds:
      - |-
        kustomize build {{.KUSTOMIZE_FLAGS}} ./automation/kubernetes | kubectl delete -f -

  n8n:workflows:backup:
    desc: Run n8n workflow/credential export to S3 now
    cmds:
      - kubectl -n automation create job --from=cronjob/n8n-workflow-backup n8n-workflow-backup-manual-$(date +%s)
