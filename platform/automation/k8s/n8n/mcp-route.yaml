---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: n8n-mcp-http-route
  namespace: automation
  annotations:
    external-dns.alpha.kubernetes.io/hostname: n8n.homelab.internal
spec:
  parentRefs:
    - name: ai-gateway
      namespace: ai
  hostnames:
    - n8n.homelab.internal
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /mcp-server/http
      backendRefs:
        - name: mcp-backend
          group: agentgateway.dev
          kind: AgentgatewayBackend
