---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: freshrss
  namespace: feeds
  labels:
    app: freshrss
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: freshrss
  template:
    metadata:
      labels:
        app: freshrss
    spec:
      initContainers:
        - name: provision
          image: freshrss/freshrss:latest
          imagePullPolicy: IfNotPresent
          command: ["/bin/sh", "/scripts/provision.sh"]
          env:
            - name: DEFAULT_USER
              value: teaglebuilt
            - name: BASE_URL
              value: https://feeds.homelab.internal
            - name: DB_HOST
              value: postgres-rw.data.svc.cluster.local
            - name: DB_BASE
              value: freshrss
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: pg-freshrss-secret
                  key: username
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: pg-freshrss-secret
                  key: password
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: freshrss-admin
                  key: admin-password
            - name: ADMIN_API_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: freshrss-admin
                  key: admin-api-password
          volumeMounts:
            - name: data
              mountPath: /var/www/FreshRSS/data
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: opml
              mountPath: /opml
              readOnly: true
      containers:
        - name: freshrss
          image: freshrss/freshrss:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: TZ
              value: America/New_York
            - name: CRON_MIN
              value: "*/20"
          ports:
            - containerPort: 80
          volumeMounts:
            - name: data
              mountPath: /var/www/FreshRSS/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: freshrss-data
        - name: scripts
          configMap:
            name: freshrss-scripts
            defaultMode: 0o555
        - name: opml
          configMap:
            name: freshrss-opml
