---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: feed-routes
  namespace: feeds
spec:
  parentRefs:
    - name: homelab-internal-gateway
      namespace: kube-system
  hostnames:
    - feed.homelab.internal
  rules:
    - backendRefs:
        - name: freshrss-service
          port: 80
