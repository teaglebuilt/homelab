---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: feed-routes
  namespace: feeds
  annotations:
    external-dns.alpha.kubernetes.io/hostname: feeds.homelab.internal
spec:
  parentRefs:
    - name: homelab-internal-gateway
      namespace: kube-system
  hostnames:
    - feeds.homelab.internal
  rules:
    - backendRefs:
        - name: freshrss
          port: 80
