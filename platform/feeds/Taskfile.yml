---
version: 3

vars:
  TERRAFORM: tofu -chdir=terraform

tasks:
  gen-opml:
    dir: feeds
    summary: 'Generate FreshRSS OPML seeds from the YouTube subscriptions source of truth'
    cmds:
      - |-
        python3 .claude/skills/youtube/scripts/generate_opml.py \
          --input youtube-subscriptions.yaml \
          --output kubernetes/freshrss/opml/youtube-subscriptions.opml

  kdeploy:
    dir: feeds
    deps: [gen-opml]
    cmds:
      - |-
        kustomize build {{.KUSTOMIZE_FLAGS}} ./kubernetes | kubectl apply -f -

  kdestroy:
    dir: feeds
    cmds:
      - |-
        kustomize build {{.KUSTOMIZE_FLAGS}} ./kubernetes | kubectl delete -f -

  tdeploy:
    dir: feeds
    cmds:
      - |-
        {{.TERRAFORM}} init --upgrade
      - |-
        {{.TERRAFORM}} apply -auto-approve \
          -var portainer_ip=$PORTAINER_IP \
          -var portainer_api_key=$PORTAINER_API_KEY \
          -var="freshrss_default_password=$FRESHRSS_DEFAULT_PASSWORD" \
          -var="freshrss_base_url=http://freshrss.homelab.internal"

  tdestroy:
    dir: feeds
    cmds:
      - |-
        {{.TERRAFORM}} destroy -auto-approve \
          -var portainer_ip=$PORTAINER_IP \
          -var portainer_api_key=$PORTAINER_API_KEY \
          -var="freshrss_default_password=$FRESHRSS_DEFAULT_PASSWORD" \
          -var="freshrss_base_url=http://freshrss.homelab.internal"
