version: '3'

set: [pipefail]
shopt: [globstar]

includes:
  kubernetes:
    taskfile: kubernetes/Taskfile.yml
  containers:
    taskfile: containers/Taskfile.yml
  network:
    taskfile: rack/network/Taskfile.yml
  platform:
    taskfile: platform/Taskfile.yml
  machines:
    dir: machines
    taskfile: machines/Taskfile.yml

dotenv: [
  './kubernetes/.env',
  './containers/.env',
  './platform/observability/.env',
]

tasks:
  help:
    silent: true
    cmds: [ "task -l" ]

  default:
    silent: true
    cmd: task --list

  noop:
    internal: true
    silent: true
    cmd: noop() { :; }

  deploy-homelab:
    cmds:
      # Provision both Talos clusters (Terraform).
      - task: kubernetes:provision-administration
      - task: kubernetes:provision-mlops
      # Phase 1 — base bootstrap each cluster independently (plain Cilium + identity
      # + LB pool). No cross-cluster deps, so neither can wedge on the other.
      - task: kubernetes:bootstrap-cluster
        vars: { CLUSTER: mlops }
      - task: kubernetes:bootstrap-cluster
        vars: { CLUSTER: administration }
      # Phase 2 — cross-cluster barrier: shared CA + ClusterMesh helm upgrade + routes.
      - task: connect-clusters
      - task: kubernetes:wait-for-external-certificate
      # - task: kubernetes:copy-kubeconfig
      - task: platform:deploy
      - task: platform:test

  # Phase 2 barrier — runs only AFTER both clusters are bootstrapped and healthy.
  # Order matters: the shared CA must exist in both clusters BEFORE the ClusterMesh
  # helm upgrade (authMode:cluster signs mesh certs from it).
  connect-clusters:
    cmds:
      - task: kubernetes:apply-shared-ca
        vars: { CLUSTER: mlops }
      - task: kubernetes:apply-shared-ca
        vars: { CLUSTER: administration }
      - task: kubernetes:mesh-upgrade
        vars: { CLUSTER: mlops }
      - task: kubernetes:mesh-upgrade
        vars: { CLUSTER: administration }
      - task: kubernetes:clustermesh-routes
        vars: { CLUSTER: mlops }
      - task: kubernetes:clustermesh-routes
        vars: { CLUSTER: administration }
      - task: kubernetes:clustermesh-status
        vars: { CLUSTER: mlops }
      - task: kubernetes:clustermesh-status
        vars: { CLUSTER: administration }

  spin-up-*:
    summary: Used for launching any platform service locally.
    vars:
      STACK: '{{index .MATCH 0}}'
    cmds:
      - echo "Starting stack [{{.STACK}}]"
      - docker compose up -d platform/{{.STACK}}

  serve-docs:
    cmds:
      - task: docs:serve
