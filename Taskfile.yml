version: '3'

set: [pipefail]
shopt: [globstar]

includes:
  kubernetes:
    taskfile: kubernetes/Taskfile.yml
  containers:
    taskfile: containers/Taskfile.yml
  network:
    taskfile: rack/network/Taskfile.yml
  platform:
    taskfile: platform/Taskfile.yml
  machines:
    dir: machines
    taskfile: machines/Taskfile.yml

dotenv: [
  './kubernetes/.env',
  './containers/.env',
  './platform/observability/.env',
]

tasks:
  help:
    silent: true
    cmds: [ "task -l" ]

  default:
    silent: true
    cmd: task --list

  noop:
    internal: true
    silent: true
    cmd: noop() { :; }

  deploy-kubernetes:
    cmds:
      - task: kubernetes:provision-application
      - task: kubernetes:provision-mlops
      - task: kubernetes:bootstrap-cluster
        vars: { CLUSTER: mlops }
      - task: kubernetes:bootstrap-cluster
        vars: { CLUSTER: application }
      - task: kubernetes:connect-clusters
      - task: kubernetes:kubectl:merge-kubeconfig
      - task: kubernetes:wait-for-external-certificate
        vars: { CLUSTER: application }
      - task: kubernetes:wait-for-external-certificate
        vars: { CLUSTER: mlops }
      - task: platform:deploy
        vars: { CLUSTER: application }
      - task: platform:deploy
        vars: { CLUSTER: mlops }

  destroy-kubernetes:
    cmds:
      - task: kubernetes:destroy-mlops
      - task: kubernetes:destroy-application

  spin-up-*:
    summary: Used for launching any platform service locally.
    vars:
      STACK: '{{index .MATCH 0}}'
    cmds:
      - echo "Starting stack [{{.STACK}}]"
      - docker compose up -d platform/{{.STACK}}

  serve-docs:
    cmds:
      - task: docs:serve
