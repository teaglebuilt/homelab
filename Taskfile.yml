version: '3'

set: [pipefail]
shopt: [globstar]

includes:
  kubernetes:
    taskfile: kubernetes/Taskfile.yml
  containers:
    taskfile: containers/Taskfile.yml
  network:
    taskfile: rack/network/Taskfile.yml
  platform:
    taskfile: platform/Taskfile.yml
  machines:
    dir: machines
    taskfile: machines/Taskfile.yml

dotenv: [
  './kubernetes/.env',
  './containers/.env',
  './platform/observability/.env',
]

tasks:
  help:
    silent: true
    cmds: [ "task -l" ]

  default:
    silent: true
    cmd: task --list

  noop:
    internal: true
    silent: true
    cmd: noop() { :; }

  deploy-mlops-cluster:
    summary: Standup the mlops kubernetes cluster and platform services
    cmds:
      - task: kubernetes:provision-cluster
      - task: kubernetes:cluster-health
        vars: { CONTROL_PLANE: $MASTER_NODE_IP}
      - task: kubernetes:bootstrap-cluster
      - task: kubernetes:sync-cluster-mesh
        vars: { CLUSTER: mlops }
      - task: kubernetes:wait-for-external-certificate
      - task: kubernetes:copy-kubeconfig
      - task: platform:deploy
      - task: platform:test

  deploy-homelab:
    cmds:
      - task: kubernetes:provision-mlops
      - task: kubernetes:provision-administration
      - task: deploy-clustermesh

  deploy-administration-cluster:
    summary: Standup the administration Kubernetes cluster on pve1
    cmds:
      - task: kubernetes:provision-administration
      - task: kubernetes:apply-shared-ca
        vars: { CLUSTER: administration }
      - task: kubernetes:sync-cluster-mesh
        vars: { CLUSTER: administration }

  deploy-clustermesh:
    summary: >-
      Activate Cilium ClusterMesh across mlops and administration. Requires both
      clusters up (run deploy-administration-cluster first) and the shared CA
      generated (see kubernetes/clusters/_shared/README.md). Run the LB cutover
      (kubernetes:clustermesh-lb-cutover CLUSTER=<name>) and apply the printed
      UniFi routes via the network-agent to complete native cross-cluster routing.
    cmds:
      - task: kubernetes:apply-shared-ca
        vars: { CLUSTER: mlops }
      - task: kubernetes:apply-shared-ca
        vars: { CLUSTER: administration }
      - task: kubernetes:sync-cluster-mesh
        vars: { CLUSTER: mlops }
      - task: kubernetes:sync-cluster-mesh
        vars: { CLUSTER: administration }
      - task: kubernetes:clustermesh-routes
        vars: { CLUSTER: mlops }
      - task: kubernetes:clustermesh-routes
        vars: { CLUSTER: administration }
      - task: kubernetes:clustermesh-status
        vars: { CLUSTER: mlops }
      - task: kubernetes:clustermesh-status
        vars: { CLUSTER: administration }

  spin-up-*:
    summary: Used for launching any platform service locally.
    vars:
      STACK: '{{index .MATCH 0}}'
    cmds:
      - echo "Starting stack [{{.STACK}}]"
      - docker compose up -d platform/{{.STACK}}

  serve-docs:
    cmds:
      - task: docs:serve
